[workspace]
resolver = "3"
members = ["miniextendr-api", "miniextendr-macros", "miniextendr-engine"]
exclude = ["miniextendr-bench", "vendor", "rpkg/src/rust", "rpkg/src/vendor", "rpkg/inst/vendor"]

[workspace.dependencies]
miniextendr-api = { path = "miniextendr-api"}
miniextendr-macros = { path = "miniextendr-macros"}

[workspace.package]
version = "0.1.0"
edition = "2024"
exclude = ["vendor", "rpkg/inst/vendor"]

[profile.release]
debug-assertions = true
