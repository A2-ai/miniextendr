[workspace]
resolver = "3"
members = ["miniextendr-api", "miniextendr-macros", "miniextendr-engine", "miniextendr-bench", "miniextendr-lint"]
exclude = ["vendor", "rpkg/src/rust", "rpkg/src/vendor"]

[workspace.dependencies]
miniextendr-api = { path = "miniextendr-api", version = "0.1.0" }
miniextendr-macros = { path = "miniextendr-macros", version = "0.1.0" }
miniextendr-engine = { path = "miniextendr-engine", version = "0.1.0" }
proc-macro2 = { version = "1.0", features = ["span-locations"] }
quote = "1.0"
syn = { version = "2.0", features = ["full", "extra-traits"] }

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/CGMossa/miniextendr"
homepage = "https://github.com/CGMossa/miniextendr"
keywords = ["r", "ffi", "bindings"]
categories = ["api-bindings", "external-ffi-bindings"]
exclude = ["vendor"]

[profile.release]
debug-assertions = true
