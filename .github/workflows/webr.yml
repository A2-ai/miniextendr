name: webR / wasm32

on:
  pull_request:
    paths:
      - 'miniextendr-api/**'
      - 'miniextendr-macros/**'
      - 'miniextendr-engine/**'
      - 'miniextendr-lint/**'
      - 'rpkg/**'
      - 'tests/cross-package/**'
      - 'tests/webr-node-smoke/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile.webr'
      - '.github/workflows/webr.yml'
  push:
    branches: [main]
    paths:
      - 'miniextendr-api/**'
      - 'miniextendr-macros/**'
      - 'miniextendr-engine/**'
      - 'miniextendr-lint/**'
      - 'rpkg/**'
      - 'tests/cross-package/**'
      - 'tests/webr-node-smoke/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile.webr'
      - '.github/workflows/webr.yml'
  workflow_dispatch:

permissions:
  contents: read
  # Needed for the tier-2 job to pull ghcr.io/a2-ai/webr-mirror, which is
  # currently a private GHCR package. The `credentials:` block on the job
  # container reads $GITHUB_TOKEN with this scope. Once the mirror package
  # is flipped public via the org UI, both this permission line and the
  # `credentials:` block below can be dropped (tracked as follow-up).
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: "0"

jobs:
  cargo-check:
    name: wasm32 check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm32-check
          cache-on-failure: true

      - name: cargo check (miniextendr-api)
        run: cargo check -p miniextendr-api --target wasm32-unknown-emscripten

      # rpkg/configure invokes ${R_HOME}/bin/Rscript directly for feature
      # detection (configure.ac:133, :275, :473). The dummy R_HOME has no
      # Rscript binary, so configure fails on this bare-ubuntu runner.
      # Tier 2 (below) runs inside the webR container which has real R, so the
      # full rpkg install path is exercised there instead.

  # ── Tier 2 + 3: full wasm32 R CMD INSTALL + Node smoke ──────────────────
  # Closes #491 (tier 2) and #492 (tier 3 — Node + webR runtime smoke).
  # Runs as a single job because all three phases share the same container,
  # filesystem state, and `/tmp/wasm-lib/miniextendr` artifact:
  #   - Phase 1: native install → regenerates wasm_registry.rs via cdylib pass.
  #   - Phase 2: CC=emcc wasm install via webr-vars.mk → /tmp/wasm-lib/miniextendr.
  #   - Phase 3: Node + webR session NODEFS-mounts /tmp/wasm-lib, installs
  #              Imports from repo.r-wasm.org, drives library(miniextendr).
  # Mirrors tests/webr-smoke.sh end-to-end. CI's amd64 runners have no Rosetta
  # and plenty of disk (the local arm64 dev path hits both limits). Phase 2
  # is also the empirical validator for #494's `-C relocation-model=pic`
  # flag: if the emcc side-module link rejects non-PIC objects, Phase 2
  # fails here.
  #
  # The container image must stay digest-aligned with Dockerfile.webr's
  # WEBR_BASE — bump both together. The S7 + autoconf installs mirror the
  # Dockerfile.webr layers (Dockerfile.webr is the local dev image and bakes
  # them in; CI installs inline so we don't need to publish miniextendr-webr-dev).
  webr-install:
    name: wasm32 R CMD INSTALL (tier 2)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    container:
      # Pulled from the mirror at ghcr.io/a2-ai/webr-mirror (closes #496),
      # which `.github/workflows/mirror-webr.yml` keeps digest-aligned with
      # upstream ghcr.io/r-wasm/webr — image bytes are identical at this
      # sha256. Bump in lockstep with Dockerfile.webr's WEBR_BASE.
      image: ghcr.io/a2-ai/webr-mirror@sha256:0b9e6e41134275d186633cc0b2564f0d03c66b36c0412fdbae51c7572cdbdd40
      # The mirror package is currently private; auth via the job's
      # GITHUB_TOKEN (workflow-level `packages: read` permission above).
      # Drop both once the package is made public via the org UI.
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    # The webR base image's /bin/sh is dash; every step here uses
    # `set -euo pipefail` which is bash-only. Pin the shell at the job level
    # so individual steps don't have to repeat `shell: bash`.
    defaults:
      run:
        shell: bash
    env:
      # Shared R library readable by BOTH R binaries in this job:
      #   Phase 1 native pass → /opt/R/current/bin/R
      #   Phase 2 wasm pass   → /opt/webr/host/R-4.5.1/bin/R
      # These two R installs have disjoint default library paths in the
      # webR base image, so without a shared R_LIBS_USER Phase 2's lazy-load
      # sub-R can't find transitive Imports (lifecycle → rlang) installed by
      # the setup step. Both Rs honour R_LIBS_USER ahead of their site lib.
      R_LIBS_USER: /tmp/r-shared-lib
    steps:
      - uses: actions/checkout@v6

      - name: Install miniextendr's hard R Imports + autoconf
        run: |
          set -euo pipefail
          # `file` is used by the "Verify wasm side-module landed" step below to
          # confirm the output is wasm and not ELF; the webR base image doesn't
          # ship it. `autoconf` is needed by rpkg/configure.
          apt-get update && apt-get install -y --no-install-recommends autoconf file
          mkdir -p "$R_LIBS_USER"
          # Install via the host R that Phase 2 uses, so transitive deps land
          # in a library Phase 2's lazy-load will see. `dependencies = c(...)`
          # pulls rlang in via lifecycle/vctrs without us having to enumerate.
          /opt/webr/host/R-4.5.1/bin/Rscript -e \
            'install.packages(c("cli","lifecycle","R6","S7","vctrs"), dependencies = c("Depends","Imports","LinkingTo"), repos="https://packagemanager.posit.co/cran/__linux__/noble/latest", lib=Sys.getenv("R_LIBS_USER"))'
          # Sanity-check the transitive set landed.
          /opt/webr/host/R-4.5.1/bin/Rscript -e \
            'pkgs <- c("cli","lifecycle","rlang","R6","S7","vctrs"); miss <- setdiff(pkgs, rownames(installed.packages(lib.loc=Sys.getenv("R_LIBS_USER")))); if (length(miss)) stop("Missing: ", paste(miss, collapse=", "))'

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/cargo/registry
            /usr/local/cargo/git
          key: webr-tier2-cargo-${{ hashFiles('Cargo.lock', 'rpkg/src/rust/Cargo.lock') }}
          restore-keys: |
            webr-tier2-cargo-

      - name: Phase 1 — native R CMD INSTALL (regenerate wasm_registry.rs)
        run: |
          set -euo pipefail
          # Defensive scrub (matches tests/webr-smoke.sh); CI runners are
          # ephemeral so the cross-platform stale-.o trap doesn't apply here,
          # but staying byte-identical with the local smoke avoids drift.
          rm -f rpkg/src/*.o rpkg/src/*.so
          ( cd rpkg && bash ./configure )
          mkdir -p /tmp/native-lib
          /opt/R/current/bin/R CMD INSTALL --no-test-load --library=/tmp/native-lib rpkg

      - name: Verify Phase 1 regenerated wasm_registry.rs
        run: |
          set -euo pipefail
          ch=$(grep 'content-hash:' rpkg/src/rust/wasm_registry.rs | awk '{print $NF}')
          echo "content-hash=$ch"
          # A stub snapshot would be all-zero; the cdylib pass must rewrite it.
          test "$ch" != "0000000000000000"

      - name: Phase 2 — wasm32 R CMD INSTALL (validates #494 PIC flag)
        run: |
          set -euo pipefail
          rm -f rpkg/src/*.o rpkg/src/*.so
          ( cd rpkg && CC=emcc bash ./configure )
          # Install to an empty *host-side* temp library, NOT directly into
          # /opt/webr/wasm/.../library. R CMD INSTALL's tail-end lazy-load
          # spawns a sub-R that adds --library to .libPaths(), and if that
          # path contains the wasm-built grDevices.so / methods.so the
          # sub-R dies with 'invalid ELF header' on startup. rwasm uses
          # the same pattern (install to tempfile() lib_dir, then copy
          # the resulting tarball into place — r-wasm/rwasm:R/build.R, see
          # the "empty library otherwise R might try to load wasm packages"
          # comment). --no-byte-compile mirrors rwasm's flag set too.
          mkdir -p /tmp/wasm-lib
          WASM_TOOLS=/opt/webr/tools \
          R_SOURCE=/opt/webr/R/build/R-4.5.1 \
          R_MAKEVARS_USER=/opt/webr/packages/webr-vars.mk \
          /opt/webr/host/R-4.5.1/bin/R CMD INSTALL \
              --library=/tmp/wasm-lib \
              --no-docs --no-test-load --no-staged-install --no-byte-compile \
              rpkg

      - name: Verify wasm side-module landed
        run: |
          set -euo pipefail
          libdir=/tmp/wasm-lib/miniextendr
          test -d "$libdir"
          ls -la "$libdir/libs/"
          file "$libdir/libs/"miniextendr.so
          # Sanity: side-module must be wasm, not ELF (would mean Phase 2
          # silently fell back to native compilation).
          file "$libdir/libs/"miniextendr.so | grep -qi "WebAssembly\|wasm"

      # ── Tier 3 (#492): Node + webR runtime smoke ─────────────────────────────
      # Drives library(miniextendr) inside a webR Node session against the
      # wasm install Phase 2 just produced. The emcc link step alone is not
      # proof the side-module is actually loadable — tier 3 is.
      #
      # webR's esbuild config (.webr/src/esbuild.ts) emits TWO sets of
      # outputs: a *browser* bundle to /opt/webr/dist/ (stubs out
      # fs/worker_threads/url/etc via blankImportPlugin — cannot run in
      # Node) and a *Node* bundle to /opt/webr/src/dist/ (webr.cjs +
      # webr.mjs, both with a `__dirname`/`__filename`/`createRequire`
      # banner so the ESM build runs in Node). The image's Dockerfile
      # (see .webr/Dockerfile lines 107-108) deliberately strips
      # src/node_modules, src/dist, AND webR/config.ts (via `make clean`)
      # to shrink the published image, so we restore them here. We invoke
      # the upstream Makefile's `$(PKG_DIST)/webr.mjs` target, which is
      # what webR uses internally for `npm pack` — it chains
      # node_modules ← `npm ci`, webR/config.ts ← sed from .in,
      # `npm run build` ← tsc + esbuild, and a final asset-copy of
      # R.wasm/R.js/vfs/webr-worker.js out of /opt/webr/dist into
      # /opt/webr/src/dist. The bundle then resolves all runtime assets
      # via its own __dirname, no `baseUrl` override needed. End-to-end
      # this takes ~20s on a warm runner and is byte-locked to the
      # versions that built the image's R.wasm.
      #
      # Validated locally end-to-end against the same base image:
      # `make /opt/webr/src/dist/webr.mjs` succeeds in ~19s,
      # `import { WebR } from .../webr.mjs` boots, evalR("1+1") returns
      # {"type":"double","values":[2]}.
      - name: Tier 3 — rebuild webR's Node bundles
        run: |
          set -euo pipefail
          cd /opt/webr/src
          if [ ! -f package-lock.json ]; then
            echo "::error::/opt/webr/src/package-lock.json absent — base image layout changed."
            ls -la /opt/webr/src/ 2>&1 || true
            exit 1
          fi
          # Make target uses an absolute path because PKG_DIST is
          # computed dynamically — see .webr/src/Makefile for the rule.
          make /opt/webr/src/dist/webr.mjs
          test -f /opt/webr/src/dist/webr.mjs
          test -f /opt/webr/src/dist/webr.cjs
          test -f /opt/webr/src/dist/R.wasm  # asset copy step ran
          ls -la /opt/webr/src/dist/

      - name: Tier 3 — run Node + webR smoke (library(miniextendr))
        working-directory: tests/webr-node-smoke
        run: |
          set -euo pipefail
          # Hard wall-clock cap: webR init + Imports install + library load
          # should take well under 10 min on a clean runner. If we ever hit
          # 15 min the runner has wedged on something — fail visibly rather
          # than burning the 90-min job timeout.
          timeout 900 node smoke.mjs
