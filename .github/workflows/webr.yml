name: webR / wasm32

on:
  pull_request:
    paths:
      - 'miniextendr-api/**'
      - 'miniextendr-macros/**'
      - 'miniextendr-engine/**'
      - 'miniextendr-lint/**'
      - 'rpkg/**'
      # The scaffold leg (#1259) builds a freshly scaffolded end-user package
      # from minirextendr's templates, so template/scaffolder changes must
      # trigger this workflow too.
      - 'minirextendr/**'
      - 'tests/cross-package/**'
      - 'tests/webr-node-smoke/**'
      - 'tests/webr-smoke.sh'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile.webr'
      - 'Dockerfile.webr-arm64'
      - '.github/workflows/webr.yml'
  push:
    branches: [main]
    paths:
      - 'miniextendr-api/**'
      - 'miniextendr-macros/**'
      - 'miniextendr-engine/**'
      - 'miniextendr-lint/**'
      - 'rpkg/**'
      - 'minirextendr/**'
      - 'tests/cross-package/**'
      - 'tests/webr-node-smoke/**'
      - 'tests/webr-smoke.sh'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile.webr'
      - 'Dockerfile.webr-arm64'
      - '.github/workflows/webr.yml'
  workflow_dispatch:

permissions:
  contents: read
  # Needed for the tier-2 job to pull ghcr.io/a2-ai/webr-mirror, which is
  # currently a private GHCR package. The `credentials:` block on the job
  # container reads $GITHUB_TOKEN with this scope. Once the mirror package
  # is flipped public via the org UI, both this permission line and the
  # `credentials:` block below can be dropped (tracked as follow-up).
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  # Cancel superseded runs on PRs only. On main pushes, let the in-flight run
  # finish: with unconditional cancel-in-progress, the next merge killed the
  # running tier-2/3 job, so rapid merge bursts left intermediate main commits
  # with no webR validation at all. Queued (not yet started) main runs are
  # still deduped by GitHub's pending-run handling, so a burst validates its
  # first and latest commits without piling up runners.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: "0"

jobs:
  # The webR base-image digest is pinned in three places that must stay
  # identical: Dockerfile.webr's WEBR_BASE (the source of truth —
  # mirror-webr.yml reads that pin to mirror upstream), Dockerfile.webr-arm64's
  # WEBR_AMD64_DONOR (the copied wasm sysroot must come from the same image
  # bytes), and this workflow's tier-2 container image. "Bump in lockstep" was
  # previously a comment-only invariant; this job enforces it.
  pin-lockstep:
    name: webR image pin lockstep
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Compare the three pinned digests
        run: |
          set -euo pipefail
          base=$(grep -E '^ARG WEBR_BASE=' Dockerfile.webr | grep -Eo 'sha256:[0-9a-f]{64}' | sort -u)
          donor=$(grep -E '^ARG WEBR_AMD64_DONOR=' Dockerfile.webr-arm64 | grep -Eo 'sha256:[0-9a-f]{64}' | sort -u)
          ci=$(grep -E 'image: ghcr\.io/a2-ai/webr-mirror@' .github/workflows/webr.yml | grep -Eo 'sha256:[0-9a-f]{64}' | sort -u)
          echo "Dockerfile.webr WEBR_BASE:        $base"
          echo "Dockerfile.webr-arm64 donor pin:  $donor"
          echo "webr.yml tier-2 container:        $ci"
          test -n "$base" && test -n "$donor" && test -n "$ci"
          if [ "$base" != "$donor" ] || [ "$base" != "$ci" ]; then
            echo "::error::webR base-image digests are out of lockstep — bump all three together: Dockerfile.webr (WEBR_BASE), Dockerfile.webr-arm64 (WEBR_AMD64_DONOR), .github/workflows/webr.yml (tier-2 container image)."
            exit 1
          fi
          echo "All three pins agree."

  cargo-check:
    name: wasm32 check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm32-check
          cache-on-failure: true

      - name: cargo check (miniextendr-api)
        run: cargo check -p miniextendr-api --target wasm32-unknown-emscripten

      # Cross-package crates (#493) ship deliberately-empty wasm_registry.rs
      # stubs so they can compile on wasm32. Without a CI check those stubs are
      # dead weight that could silently rot when the macro cfg-gating changes.
      # This compiles both standalone-workspace crates on wasm32 to guard the
      # gating. It validates COMPILE only — runtime cross-crate trait dispatch
      # under the wasm_registry codegen is the separate open follow-up (#495).
      - name: cargo check (cross-package crates)
        run: |
          set -euo pipefail
          for crate in tests/cross-package/producer.pkg tests/cross-package/consumer.pkg; do
            echo "::group::$crate (wasm32)"
            ( cd "$crate/src/rust" && cargo check --target wasm32-unknown-emscripten )
            echo "::endgroup::"
          done

      # rpkg/src/rust is not cargo-checked here: rpkg/configure invokes
      # ${R_HOME}/bin/Rscript directly for feature detection and this
      # bare-ubuntu runner has no R installed. Tier 2 (below) runs inside the
      # webR container which has real R, so the full rpkg install path is
      # exercised there instead. (The crates checked above need no R on
      # wasm32 — build.rs skips link_to_r() when CARGO_CFG_TARGET_ARCH is
      # wasm32, #482.) The monorepo-template job below DOES install R — its
      # scaffolded package needs one native R CMD INSTALL pass to regenerate
      # wasm_registry.rs before the wasm32 cargo check can run.

  # ── Monorepo-template wasm coverage (#1271) ─────────────────────────────
  # The tier-2/3 scaffold leg further down builds only the STANDALONE
  # template (minirextendr/inst/templates/rpkg/, via create_miniextendr_package()).
  # The MONOREPO template (minirextendr/inst/templates/monorepo/rpkg/, via
  # create_miniextendr_monorepo()) carries its own configure.ac / Makevars.in /
  # build.rs copies whose wasm branches were previously never built by any CI
  # job — lockstep with the standalone tree held only by review + `just
  # templates-check` against patches/templates.patch. This is the issue's
  # "cheaper interim": scaffold a fresh monorepo package on every PR and
  # `cargo check --target wasm32-unknown-emscripten` its rpkg crate — no emcc
  # link, no wasm R CMD INSTALL, no webR container. A single native R CMD
  # INSTALL pass is still required first: wasm32 build.rs hard-requires
  # src/rust/wasm_registry.rs, which only a host cdylib pass produces (#482);
  # that pass uses the ordinary system cc, not emcc, so this job stays cheap
  # relative to the tier-2/3 leg. The full monorepo wasm leg (native →
  # roxygenise → native → CC=emcc → tier-3 load) is gated to main-push /
  # workflow_dispatch inside the webr-install job below instead (#1271 sketch).
  monorepo-wasm-check:
    name: monorepo-template wasm32 check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: monorepo-wasm-check
          cache-on-failure: true

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies (minirextendr)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: minirextendr
          # Hard deps only (cli, fs, usethis + their trees): this job only
          # scaffolds + installs — no roxygenise, no testthat, so Suggests
          # (roxygen2, pkgload, devtools, ...) would be dead weight here.
          dependencies: '"hard"'

      - name: Install autoconf
        # ubuntu-latest images ship autoconf; the apt path is only a fallback
        # for image changes (saves ~30-60 s of apt-get update per job).
        run: |
          command -v autoconf >/dev/null || { sudo apt-get update && sudo apt-get install -y autoconf; }

      - name: Install minirextendr (this checkout)
        run: R CMD INSTALL --no-test-load minirextendr

      - name: Scaffold a monorepo package (create_miniextendr_monorepo)
        run: |
          set -euo pipefail
          rm -rf /tmp/mono-check && mkdir -p /tmp/mono-check
          Rscript -e '
            root <- "/tmp/mono-check/monorepo"
            minirextendr::create_miniextendr_monorepo(root, package = "mxmono",
              crate_name = "mxmono-core", open = FALSE)
            minirextendr::use_local_miniextendr(Sys.getenv("GITHUB_WORKSPACE"),
              path = file.path(root, "mxmono"))
          '
          # Auto-vendor guard (same trap as the standalone scaffold leg in the
          # webr-install job): configure flips to tarball mode — silently
          # building the published git sources instead of this checkout — when
          # the tree has no .git ancestor AND cargo-revendor is on PATH.
          # Unlike create_miniextendr_package(), the monorepo scaffolder
          # git-inits the workspace root itself (usethis::use_git()), so the
          # rpkg subdir already has a .git ancestor — assert it so a scaffolder
          # regression can't silently change install mode.
          test -d /tmp/mono-check/monorepo/.git

      - name: Native R CMD INSTALL (regenerate wasm_registry.rs)
        run: |
          set -euo pipefail
          ( cd /tmp/mono-check/monorepo/mxmono && bash ./configure )
          mkdir -p /tmp/mono-check-native-lib
          R CMD INSTALL --no-test-load --library=/tmp/mono-check-native-lib \
              /tmp/mono-check/monorepo/mxmono
          ch=$(grep 'content-hash:' /tmp/mono-check/monorepo/mxmono/src/rust/wasm_registry.rs | awk '{print $NF}')
          echo "monorepo scaffold wasm_registry content-hash=$ch"
          test "$ch" != "0000000000000000"

      - name: cargo check (monorepo scaffold rpkg crate, wasm32)
        run: |
          set -euo pipefail
          cd /tmp/mono-check/monorepo/mxmono/src/rust
          cargo check --target wasm32-unknown-emscripten

  # ── Tier 2 + 3: full wasm32 R CMD INSTALL + Node smoke ──────────────────
  # Closes #491 (tier 2) and #492 (tier 3 — Node + webR runtime smoke).
  # Runs as a single job because all phases share the same container,
  # filesystem state, and `/tmp/wasm-lib/*` artifacts:
  #   - Phase 1: native install → regenerates wasm_registry.rs via cdylib pass.
  #   - Phase 2: CC=emcc wasm install via webr-vars.mk → /tmp/wasm-lib/miniextendr.
  #   - Scaffold leg (#1259): the same native→wasm two-step on a package
  #     freshly scaffolded from minirextendr's templates → /tmp/wasm-lib/mxsmoke.
  #   - Monorepo scaffold leg (#1271, main-push/workflow_dispatch only): the
  #     same native→wasm two-step on a package scaffolded from the MONOREPO
  #     template → /tmp/wasm-lib/mxmono. The cheap per-PR variant (a plain
  #     wasm32 cargo check of a scaffolded monorepo crate, no emcc) runs in
  #     the separate monorepo-wasm-check job above on every PR instead.
  #   - Phase 3: Node + webR session NODEFS-mounts /tmp/wasm-lib, installs
  #              Imports from repo.r-wasm.org, drives library(miniextendr),
  #              library(mxsmoke), and (main-push/dispatch) library(mxmono).
  # Mirrors tests/webr-smoke.sh end-to-end. CI's amd64 runners have no Rosetta
  # and plenty of disk (the local arm64 dev path hits both limits). Phase 2
  # is also the empirical validator for the side-module RUSTFLAGS
  # (`-Zdefault-visibility=hidden`): if the emcc side-module link breaks under
  # them, Phase 2 fails here. (#494's `-C relocation-model=pic` was validated
  # here too, until #745 confirmed it redundant and dropped it.)
  #
  # The container image must stay digest-aligned with Dockerfile.webr's
  # WEBR_BASE — bump both together (enforced by the pin-lockstep job above).
  # The S7 + autoconf installs mirror the
  # Dockerfile.webr layers (Dockerfile.webr is the local dev image and bakes
  # them in; CI installs inline so we don't need to publish miniextendr-webr-dev).
  webr-install:
    name: wasm32 R CMD INSTALL (tier 2)
    runs-on: ubuntu-latest
    # Main-push/dispatch runs get extra headroom for the informational
    # testthat pass in tier 3 (#1255, up to 40 min at the step cap) plus the
    # monorepo scaffold leg (#1271, two extra compiles of a minimal crate —
    # one native, one wasm+build-std); per-PR runs keep the historical 90.
    timeout-minutes: ${{ github.event_name == 'pull_request' && 90 || 150 }}
    container:
      # Pulled from the mirror at ghcr.io/a2-ai/webr-mirror (closes #496),
      # which `.github/workflows/mirror-webr.yml` keeps digest-aligned with
      # upstream ghcr.io/r-wasm/webr — image bytes are identical at this
      # sha256. Bump in lockstep with Dockerfile.webr's WEBR_BASE (the
      # pin-lockstep job fails the workflow if the pins diverge).
      image: ghcr.io/a2-ai/webr-mirror@sha256:3fbf3dc3537c5b31bca94dd797dc25364693b18d71b1d0975f318fbfd6269d86
      # The mirror package is currently private; auth via the job's
      # GITHUB_TOKEN (workflow-level `packages: read` permission above).
      # Drop both once the package is made public via the org UI.
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    # The webR base image's /bin/sh is dash; every step here uses
    # `set -euo pipefail` which is bash-only. Pin the shell at the job level
    # so individual steps don't have to repeat `shell: bash`.
    defaults:
      run:
        shell: bash
    env:
      # Shared R library readable by BOTH R binaries in this job:
      #   Phase 1 native pass → /opt/R/current/bin/R
      #   Phase 2 wasm pass   → /opt/webr/host/R-4.6.0/bin/R
      # These two R installs have disjoint default library paths in the
      # webR base image, so without a shared R_LIBS_USER Phase 2's lazy-load
      # sub-R can't find transitive Imports (lifecycle → rlang) installed by
      # the setup step. Both Rs honour R_LIBS_USER ahead of their site lib.
      R_LIBS_USER: /tmp/r-shared-lib
    steps:
      - uses: actions/checkout@v7

      - name: Install miniextendr's hard R Imports + autoconf
        run: |
          set -euo pipefail
          # `file` is used by the "Verify wasm side-module landed" step below to
          # confirm the output is wasm and not ELF; the webR base image doesn't
          # ship it. `autoconf` is needed by rpkg/configure.
          apt-get update && apt-get install -y --no-install-recommends autoconf file
          mkdir -p "$R_LIBS_USER"
          # Derive the Imports list from rpkg/DESCRIPTION (minus base-R
          # packages) instead of hand-enumerating it — tests/webr-node-smoke/
          # smoke.mjs derives its copy the same way, so DESCRIPTION is the
          # single source of truth. Install via the host R that Phase 2 uses,
          # so transitive deps land in a library Phase 2's lazy-load will see;
          # `dependencies = c(...)` pulls rlang in via lifecycle/vctrs. The
          # closing requireNamespace() sweep loads each import through
          # R_LIBS_USER, exercising the full transitive graph (stronger than
          # the old hand-maintained installed.packages() list check).
          /opt/webr/host/R-4.6.0/bin/Rscript -e '
            imports <- trimws(strsplit(read.dcf("rpkg/DESCRIPTION")[1, "Imports"], ",")[[1]])
            imports <- sub("\\s*\\(.*\\)$", "", imports)
            imports <- setdiff(imports, rownames(installed.packages(priority = "base")))
            stopifnot(length(imports) > 0)
            cat("Derived hard Imports:", paste(imports, collapse = ", "), "\n")
            install.packages(imports, dependencies = c("Depends", "Imports", "LinkingTo"),
                             repos = "https://packagemanager.posit.co/cran/__linux__/noble/latest",
                             lib = Sys.getenv("R_LIBS_USER"))
            miss <- imports[!vapply(imports, requireNamespace, logical(1), quietly = TRUE)]
            if (length(miss)) stop("Unloadable after install: ", paste(miss, collapse = ", "))
          '

      - name: Cache cargo registry + git
        uses: actions/cache@v6
        with:
          path: |
            /usr/local/cargo/registry
            /usr/local/cargo/git
          key: webr-tier2-cargo-${{ hashFiles('Cargo.lock', 'rpkg/src/rust/Cargo.lock') }}
          restore-keys: |
            webr-tier2-cargo-

      - name: Phase 1 — native R CMD INSTALL (regenerate wasm_registry.rs)
        run: |
          set -euo pipefail
          # Defensive scrub (matches tests/webr-smoke.sh); CI runners are
          # ephemeral so the cross-platform stale-.o trap doesn't apply here,
          # but staying byte-identical with the local smoke avoids drift.
          rm -f rpkg/src/*.o rpkg/src/*.so
          ( cd rpkg && bash ./configure )
          mkdir -p /tmp/native-lib
          /opt/R/current/bin/R CMD INSTALL --no-test-load --library=/tmp/native-lib rpkg

      - name: Verify Phase 1 regenerated wasm_registry.rs
        run: |
          set -euo pipefail
          ch=$(grep 'content-hash:' rpkg/src/rust/wasm_registry.rs | awk '{print $NF}')
          echo "content-hash=$ch"
          # A stub snapshot would be all-zero; the cdylib pass must rewrite it.
          test "$ch" != "0000000000000000"

      - name: Phase 2 — wasm32 R CMD INSTALL (validates side-module RUSTFLAGS)
        run: |
          set -euo pipefail
          rm -f rpkg/src/*.o rpkg/src/*.so
          ( cd rpkg && CC=emcc bash ./configure )
          # Install to an empty *host-side* temp library, NOT directly into
          # /opt/webr/wasm/.../library. R CMD INSTALL's tail-end lazy-load
          # spawns a sub-R that adds --library to .libPaths(), and if that
          # path contains the wasm-built grDevices.so / methods.so the
          # sub-R dies with 'invalid ELF header' on startup. rwasm uses
          # the same pattern (install to tempfile() lib_dir, then copy
          # the resulting tarball into place — r-wasm/rwasm:R/build.R, see
          # the "empty library otherwise R might try to load wasm packages"
          # comment). --no-byte-compile mirrors rwasm's flag set too.
          mkdir -p /tmp/wasm-lib
          WASM_TOOLS=/opt/webr/tools \
          R_SOURCE=/opt/webr/R/build/R-4.6.0 \
          R_MAKEVARS_USER=/opt/webr/packages/webr-vars.mk \
          /opt/webr/host/R-4.6.0/bin/R CMD INSTALL \
              --library=/tmp/wasm-lib \
              --no-docs --no-test-load --no-staged-install --no-byte-compile \
              rpkg

      - name: Verify wasm side-module landed
        run: |
          set -euo pipefail
          libdir=/tmp/wasm-lib/miniextendr
          test -d "$libdir"
          ls -la "$libdir/libs/"
          file "$libdir/libs/"miniextendr.so
          # Sanity: side-module must be wasm, not ELF (would mean Phase 2
          # silently fell back to native compilation).
          file "$libdir/libs/"miniextendr.so | grep -qi "WebAssembly\|wasm"

      # ── Scaffold leg (#1259): end-user scaffolded-package wasm path ─────────
      # Everything above validates rpkg/ — the monorepo exemplar. End users get
      # their build plumbing from minirextendr's templates
      # (minirextendr/inst/templates/rpkg/), whose wasm branches in
      # configure.ac / Makevars.in / build.rs were previously never built by
      # any CI job — coverage transferred only indirectly via the locked
      # rpkg→templates delta (patches/templates.patch). A template-only
      # regression (e.g. through a templates-approve refresh) would have
      # surfaced for end users, not in CI.
      #
      # These steps run the real end-user story: install minirextendr from
      # this checkout, create_miniextendr_package() a fresh package (its
      # stock lib.rs ships trivial #[miniextendr] fns add()/hello()), point
      # its framework git deps at this checkout with use_local_miniextendr()
      # (writes the .miniextendr-local marker; configure then emits the
      # [patch."https://github.com/A2-ai/miniextendr"] block — the same
      # mechanism rpkg's monorepo mode uses, so the leg validates the PR's
      # code, not the published git sources), then repeat the native→wasm
      # two-step install on the scaffold. The tier-3 session below loads the
      # result alongside miniextendr (SMOKE_SCAFFOLD_PKG).
      - name: Scaffold leg — install minirextendr + roxygen tooling
        run: |
          set -euo pipefail
          # git: the git-init guard below (and usethis's git probing).
          # libgit2: runtime dep of gert (usethis's git backend) — the P3M
          # binary links the system lib. The apt lists from the first step's
          # `apt-get update` are still on disk in this container.
          apt-get install -y --no-install-recommends git libgit2-dev
          # minirextendr's Imports are derived from its DESCRIPTION (same
          # single-source-of-truth pattern as the miniextendr Imports step
          # above). roxygen2/pkgload/pkgbuild drive the documented
          # post-install document() pass that turns the scaffold's minimal
          # NAMESPACE stub into the real one (useDynLib + exports) — without
          # it the installed package loads no DLL.
          /opt/webr/host/R-4.6.0/bin/Rscript -e '
            # P3M only serves prebuilt noble binaries when the user agent
            # carries the R version/platform; without it this dep tree (usethis
            # + roxygen2 pull in stringi et al.) compiles from source for many
            # extra minutes. Falls back to source transparently if P3M has no
            # binary for this R version.
            options(HTTPUserAgent = sprintf("R/%s R (%s)", getRversion(),
              paste(getRversion(), R.version[["platform"]], R.version[["arch"]], R.version[["os"]])))
            imports <- trimws(strsplit(read.dcf("minirextendr/DESCRIPTION")[1, "Imports"], ",")[[1]])
            imports <- sub("\\s*\\(.*\\)$", "", imports)
            imports <- setdiff(imports, rownames(installed.packages(priority = "base")))
            pkgs <- union(imports, c("roxygen2", "pkgload", "pkgbuild"))
            cat("Installing:", paste(pkgs, collapse = ", "), "\n")
            install.packages(pkgs, dependencies = c("Depends", "Imports", "LinkingTo"),
                             repos = "https://packagemanager.posit.co/cran/__linux__/noble/latest",
                             lib = Sys.getenv("R_LIBS_USER"))
            miss <- pkgs[!vapply(pkgs, requireNamespace, logical(1), quietly = TRUE)]
            if (length(miss)) stop("Unloadable after install: ", paste(miss, collapse = ", "))
          '
          /opt/webr/host/R-4.6.0/bin/R CMD INSTALL --no-test-load --library="$R_LIBS_USER" minirextendr

      - name: Scaffold leg — create a fresh end-user package
        run: |
          set -euo pipefail
          rm -rf /tmp/scaffold && mkdir -p /tmp/scaffold
          /opt/R/current/bin/Rscript -e '
            minirextendr::create_miniextendr_package("/tmp/scaffold/mxsmoke", open = FALSE)
            minirextendr::use_local_miniextendr(Sys.getenv("GITHUB_WORKSPACE"), path = "/tmp/scaffold/mxsmoke")
          '
          # The template's stock fns are kept as-is. rpkg (loaded first in
          # the tier-3 webR session) also exports an `add`
          # (rpkg/src/rust/panic_tests.rs) — an *intentional* name collision:
          # since #1273 the generated C wrapper symbols are crate-prefixed
          # (`C_mxsmoke_add` vs `C_miniextendr_add`), so both packages
          # sharing one Emscripten side-module GOT must dispatch to their
          # own implementations. Tier 3 asserts exactly that.
          # configure auto-vendors (flipping to tarball mode, which would
          # freeze and build the *published* git sources instead of this
          # checkout) only when the tree has no .git ancestor AND
          # cargo-revendor is on PATH. The container ships no cargo-revendor
          # today; git-init the scaffold so the guard holds even if that
          # changes.
          git init -q /tmp/scaffold/mxsmoke

      - name: Scaffold leg — native install + roxygen pass (wrappers, wasm_registry.rs, NAMESPACE)
        run: |
          set -euo pipefail
          # The container's default locale is C. miniextendr's package init
          # asserts l10n_info()[["UTF-8"]] and refuses to dyn.load otherwise
          # (miniextendr-api/src/encoding.rs). The wrapper-gen dyn.load inside
          # R CMD INSTALL takes the minimal init path (MINIEXTENDR_WRAPPER_GEN=1)
          # and never hits the check, but roxygenise's pkgload load_dll and the
          # sanity library() below run the full init — so this step needs a
          # UTF-8 locale. noble ships C.UTF-8 without locale-gen.
          export LANG=C.UTF-8 LC_ALL=C.UTF-8
          ( cd /tmp/scaffold/mxsmoke && bash ./configure )
          mkdir -p /tmp/scaffold-native-lib
          # Install #1: the Makevars wrapper-gen pass writes
          # R/mxsmoke-wrappers.R and src/rust/wasm_registry.rs (the wasm build
          # hard-requires the latter — the template build.rs refuses a stub).
          /opt/R/current/bin/R CMD INSTALL --no-test-load --library=/tmp/scaffold-native-lib /tmp/scaffold/mxsmoke
          ch=$(grep 'content-hash:' /tmp/scaffold/mxsmoke/src/rust/wasm_registry.rs | awk '{print $NF}')
          echo "scaffold wasm_registry content-hash=$ch"
          test "$ch" != "0000000000000000"
          test -s /tmp/scaffold/mxsmoke/R/mxsmoke-wrappers.R
          # The scaffolded NAMESPACE is a minimal stub until the documented
          # roxygen pass runs (miniextendr_build()'s document() step); without
          # it the installed package loads no DLL and exports nothing. Run
          # roxygen2 directly from a fresh session, then reinstall (cargo is
          # warm — seconds) so the installed image matches the final NAMESPACE.
          /opt/R/current/bin/Rscript -e 'roxygen2::roxygenise("/tmp/scaffold/mxsmoke")'
          grep -q "useDynLib(mxsmoke" /tmp/scaffold/mxsmoke/NAMESPACE
          /opt/R/current/bin/R CMD INSTALL --no-test-load --library=/tmp/scaffold-native-lib /tmp/scaffold/mxsmoke
          # Native runtime sanity: the template's stock #[miniextendr] fns.
          /opt/R/current/bin/Rscript -e '
            library(mxsmoke, lib.loc = "/tmp/scaffold-native-lib")
            stopifnot(identical(mxsmoke::add(2, 3), 5))
            stopifnot(identical(mxsmoke::hello("webR"), "Hello, webR!"))
            cat("scaffold native runtime sanity OK\n")
          '

      - name: Scaffold leg — wasm32 R CMD INSTALL (template wasm branches)
        run: |
          set -euo pipefail
          # Scrub the native objects so emcc recompiles .c → wasm .o (same
          # stale-mtime trap as Phase 2). Install into the same /tmp/wasm-lib
          # as Phase 2 so tier 3's existing NODEFS mount exposes both packages.
          rm -f /tmp/scaffold/mxsmoke/src/*.o /tmp/scaffold/mxsmoke/src/*.so
          ( cd /tmp/scaffold/mxsmoke && CC=emcc bash ./configure )
          WASM_TOOLS=/opt/webr/tools \
          R_SOURCE=/opt/webr/R/build/R-4.6.0 \
          R_MAKEVARS_USER=/opt/webr/packages/webr-vars.mk \
          /opt/webr/host/R-4.6.0/bin/R CMD INSTALL \
              --library=/tmp/wasm-lib \
              --no-docs --no-test-load --no-staged-install --no-byte-compile \
              /tmp/scaffold/mxsmoke

      - name: Scaffold leg — verify wasm side-module landed
        run: |
          set -euo pipefail
          libdir=/tmp/wasm-lib/mxsmoke
          test -d "$libdir"
          ls -la "$libdir/libs/"
          file "$libdir/libs/mxsmoke.so"
          # Sanity: side-module must be wasm, not ELF (would mean the wasm
          # pass silently fell back to native compilation).
          file "$libdir/libs/mxsmoke.so" | grep -qi "WebAssembly\|wasm"

      # ── Monorepo scaffold leg (#1271): full native → wasm variant ────────────
      # The cheap per-PR `monorepo-wasm-check` job (see cargo-check further up)
      # only cargo-checks a scaffolded monorepo rpkg crate on wasm32. This is
      # the full leg from the issue sketch: scaffold via
      # create_miniextendr_monorepo(), use_local_miniextendr() on the rpkg
      # subdir, then repeat the SAME native → roxygenise → native → CC=emcc
      # sequence as the standalone mxsmoke leg above, and load the result in
      # tier 3 alongside miniextendr and mxsmoke. Gated to main-push /
      # workflow_dispatch — it roughly doubles the scaffold leg's wall time
      # (two extra compiles of a minimal crate) and PR latency isn't worth
      # that for a leg the cheap wasm32-check job already covers structurally.
      # Reuses the minirextendr + roxygen tooling already installed into
      # R_LIBS_USER by the mxsmoke "install minirextendr + roxygen tooling"
      # step above — no need to reinstall.
      - name: Monorepo scaffold leg — create a fresh end-user monorepo
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          rm -rf /tmp/scaffold-mono && mkdir -p /tmp/scaffold-mono
          /opt/R/current/bin/Rscript -e '
            minirextendr::create_miniextendr_monorepo("/tmp/scaffold-mono/monorepo",
              package = "mxmono", crate_name = "mxmono-core", open = FALSE)
            minirextendr::use_local_miniextendr(Sys.getenv("GITHUB_WORKSPACE"),
              path = "/tmp/scaffold-mono/monorepo/mxmono")
          '
          # The template's stock fns are kept as-is. rpkg (loaded first in
          # tier 3) and mxsmoke both export an add / hello — an *intentional*
          # name collision: since #1273 the generated C wrapper symbols are
          # crate-prefixed (`C_mxmono_core_add` here — the prefix is the
          # CRATE name, `mxmono-core` per the create step above, not the
          # package name — vs `C_mxsmoke_add` / `C_miniextendr_add`), so all
          # three packages sharing one Emscripten side-module GOT must
          # dispatch to their own implementations. Tier 3 asserts exactly
          # that.
          # Auto-vendor guard: unlike create_miniextendr_package() (which
          # needs the explicit `git init` above for mxsmoke), the monorepo
          # scaffolder git-inits the workspace root itself, giving the rpkg
          # subdir a .git ancestor. Assert it so a scaffolder regression
          # can't silently flip configure into tarball mode.
          test -d /tmp/scaffold-mono/monorepo/.git

      - name: Monorepo scaffold leg — native install + roxygen pass (wrappers, wasm_registry.rs, NAMESPACE)
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          export LANG=C.UTF-8 LC_ALL=C.UTF-8
          ( cd /tmp/scaffold-mono/monorepo/mxmono && bash ./configure )
          mkdir -p /tmp/scaffold-mono-native-lib
          /opt/R/current/bin/R CMD INSTALL --no-test-load --library=/tmp/scaffold-mono-native-lib /tmp/scaffold-mono/monorepo/mxmono
          ch=$(grep 'content-hash:' /tmp/scaffold-mono/monorepo/mxmono/src/rust/wasm_registry.rs | awk '{print $NF}')
          echo "monorepo scaffold wasm_registry content-hash=$ch"
          test "$ch" != "0000000000000000"
          test -s /tmp/scaffold-mono/monorepo/mxmono/R/mxmono-wrappers.R
          /opt/R/current/bin/Rscript -e 'roxygen2::roxygenise("/tmp/scaffold-mono/monorepo/mxmono")'
          grep -q "useDynLib(mxmono" /tmp/scaffold-mono/monorepo/mxmono/NAMESPACE
          /opt/R/current/bin/R CMD INSTALL --no-test-load --library=/tmp/scaffold-mono-native-lib /tmp/scaffold-mono/monorepo/mxmono
          /opt/R/current/bin/Rscript -e '
            library(mxmono, lib.loc = "/tmp/scaffold-mono-native-lib")
            stopifnot(identical(mxmono::add(2, 3), 5))
            stopifnot(identical(mxmono::hello("webR"), "Hello, webR!"))
            cat("monorepo scaffold native runtime sanity OK\n")
          '

      - name: Monorepo scaffold leg — wasm32 R CMD INSTALL (monorepo template wasm branches)
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          rm -f /tmp/scaffold-mono/monorepo/mxmono/src/*.o /tmp/scaffold-mono/monorepo/mxmono/src/*.so
          ( cd /tmp/scaffold-mono/monorepo/mxmono && CC=emcc bash ./configure )
          WASM_TOOLS=/opt/webr/tools \
          R_SOURCE=/opt/webr/R/build/R-4.6.0 \
          R_MAKEVARS_USER=/opt/webr/packages/webr-vars.mk \
          /opt/webr/host/R-4.6.0/bin/R CMD INSTALL \
              --library=/tmp/wasm-lib \
              --no-docs --no-test-load --no-staged-install --no-byte-compile \
              /tmp/scaffold-mono/monorepo/mxmono

      - name: Monorepo scaffold leg — verify wasm side-module landed
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          libdir=/tmp/wasm-lib/mxmono
          test -d "$libdir"
          ls -la "$libdir/libs/"
          file "$libdir/libs/mxmono.so"
          file "$libdir/libs/mxmono.so" | grep -qi "WebAssembly\|wasm"

      # ── Tier 3 (#492): Node + webR runtime smoke ─────────────────────────────
      # Drives library(miniextendr) inside a webR Node session against the
      # wasm install Phase 2 just produced. The emcc link step alone is not
      # proof the side-module is actually loadable — tier 3 is.
      #
      # webR's esbuild config (.webr/src/esbuild.ts) emits TWO sets of
      # outputs: a *browser* bundle to /opt/webr/dist/ (stubs out
      # fs/worker_threads/url/etc via blankImportPlugin — cannot run in
      # Node) and a *Node* bundle to /opt/webr/src/dist/ (webr.cjs +
      # webr.mjs, both with a `__dirname`/`__filename`/`createRequire`
      # banner so the ESM build runs in Node). The image's Dockerfile
      # (see .webr/Dockerfile lines 107-108) deliberately strips
      # src/node_modules, src/dist, AND webR/config.ts (via `make clean`)
      # to shrink the published image, so we restore them here. We invoke
      # the upstream Makefile's `$(PKG_DIST)/webr.mjs` target, which is
      # what webR uses internally for `npm pack` — it chains
      # node_modules ← `npm ci`, webR/config.ts ← sed from .in,
      # `npm run build` ← tsc + esbuild, and a final asset-copy of
      # R.wasm/R.js/vfs/webr-worker.js out of /opt/webr/dist into
      # /opt/webr/src/dist. The bundle then resolves all runtime assets
      # via its own __dirname, no `baseUrl` override needed. End-to-end
      # this takes ~20s on a warm runner and is byte-locked to the
      # versions that built the image's R.wasm.
      #
      # Validated locally end-to-end against the same base image:
      # `make /opt/webr/src/dist/webr.mjs` succeeds in ~19s,
      # `import { WebR } from .../webr.mjs` boots, evalR("1+1") returns
      # {"type":"double","values":[2]}.
      - name: Tier 3 — rebuild webR's Node bundles
        run: |
          set -euo pipefail
          cd /opt/webr/src
          if [ ! -f package-lock.json ]; then
            echo "::error::/opt/webr/src/package-lock.json absent — base image layout changed."
            ls -la /opt/webr/src/ 2>&1 || true
            exit 1
          fi
          # Make target uses an absolute path because PKG_DIST is
          # computed dynamically — see .webr/src/Makefile for the rule.
          make /opt/webr/src/dist/webr.mjs
          test -f /opt/webr/src/dist/webr.mjs
          test -f /opt/webr/src/dist/webr.cjs
          test -f /opt/webr/src/dist/R.wasm  # asset copy step ran
          ls -la /opt/webr/src/dist/

      - name: Tier 3 — run Node + webR smoke (library(miniextendr) + scaffold pkg)
        working-directory: tests/webr-node-smoke
        env:
          # Scaffold leg (#1259): also load the freshly scaffolded end-user
          # package(s) installed into /tmp/wasm-lib above and drive their
          # stock template functions. Comma-separated list (#1271) — smoke.mjs
          # splits and loads each in turn. mxsmoke (standalone template) runs
          # on every PR; mxmono (monorepo template) is added only on main-push
          # / workflow_dispatch, matching the "Monorepo scaffold leg" steps
          # above which only run there. Unset (e.g. in tests/webr-smoke.sh
          # without --scaffold) the runner behaves exactly as before.
          SMOKE_SCAFFOLD_PKG: ${{ github.event_name != 'pull_request' && 'mxsmoke,mxmono' || 'mxsmoke' }}
          # Informational testthat pass (#1255): on main-push and
          # workflow_dispatch only, run rpkg's testthat suite inside the webR
          # session and report counts. Per-PR runs stay load-only — wall time
          # gates PRs; the counts are informational and main-push visibility
          # is enough to catch a wasm-runtime-behavior regression. Test
          # failures never gate (many legitimately fail under wasm); only a
          # harness error before the counts line turns the step red.
          SMOKE_TESTTHAT: ${{ github.event_name != 'pull_request' && '1' || '' }}
        run: |
          set -euo pipefail
          # Hard wall-clock cap: webR init + Imports install + library load
          # should take well under 10 min on a clean runner; the testthat
          # pass (when enabled) adds its own 20-min in-runner budget, so its
          # cap is 900 + that budget + slack. If we ever hit the cap the
          # runner has wedged on something — fail visibly rather than
          # burning the job timeout.
          if [ "${SMOKE_TESTTHAT:-}" = "1" ]; then cap=2400; else cap=900; fi
          timeout "$cap" node smoke.mjs
