name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/**'
      - '*/src/**'
      - 'rpkg/src/rust/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # miniextendr-api/build.rs calls `R RHOME` to resolve libR for linking.
      # Rustdoc-only builds don't link — build.rs just has to not panic, and
      # its `r_home` existence check accepts any valid directory. Dummy with
      # $RUNNER_TEMP (same pattern as dvs2's CI). Must be set from a step —
      # the `runner` context is not available in job-level `env:`.
      - name: Set dummy R_HOME
        run: echo "R_HOME=$RUNNER_TEMP" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@nightly

      - name: Build rustdoc (workspace crates)
        env:
          RUSTFLAGS: --cfg=docsrs
          RUSTDOCFLAGS: --cfg=docsrs -Z unstable-options --document-private-items
        run: cargo doc --no-deps -Z rustdoc-map -p miniextendr-api -p miniextendr-macros -p miniextendr-lint -p miniextendr-engine

      # rpkg/src/rust/Cargo.toml [patch.crates-io] points at
      # ../../vendor/miniextendr-api etc. Populate vendor/ so the
      # patch paths resolve. `just vendor` calls `cargo revendor` directly;
      # does NOT need autoconf or `just configure` (no Rscript, no Makevars).
      - name: Install cargo-revendor
        run: cargo install --path cargo-revendor

      - name: Restore rpkg vendor directory cache
        id: rpkg-vendor-cache
        uses: actions/cache/restore@v5
        with:
          path: rpkg/vendor
          key: ${{ runner.os }}-rpkg-vendor-${{ hashFiles('Cargo.lock', 'rpkg/src/rust/Cargo.lock', 'miniextendr-api/**/*.rs', 'miniextendr-macros/**/*.rs', 'miniextendr-lint/**/*.rs') }}

      - name: Install just
        if: steps.rpkg-vendor-cache.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@just

      - name: Generate rpkg/vendor
        if: steps.rpkg-vendor-cache.outputs.cache-hit != 'true'
        run: just vendor

      - name: Save rpkg vendor directory cache
        if: steps.rpkg-vendor-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: rpkg/vendor
          key: ${{ steps.rpkg-vendor-cache.outputs.cache-primary-key }}

      - name: Build rustdoc (rpkg)
        env:
          RUSTFLAGS: --cfg=docsrs
          RUSTDOCFLAGS: --cfg=docsrs -Z unstable-options --document-private-items
        run: cargo doc --no-deps -Z rustdoc-map --manifest-path rpkg/src/rust/Cargo.toml

      - name: Merge rpkg rustdoc into main docs
        run: cp -rn rpkg/src/rust/target/doc/* target/doc/ 2>/dev/null || true

      - name: Install Zola
        run: |
          ZOLA_VERSION="0.22.1"
          curl -sL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv zola /usr/local/bin/

      - name: Generate manual from docs/
        run: bash scripts/docs-to-site.sh

      - name: Build Zola site
        run: cd site && zola build

      - name: Copy rustdoc into site
        run: |
          cp -r target/doc site/public/rustdoc
          rm -f site/public/rustdoc/.lock

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Fix permissions
        run: |
          chmod -c -R +rX "site/public" | while read line; do
            echo "::warning title=Invalid file permissions automatically fixed::$line"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
