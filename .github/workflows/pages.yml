name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/**'
      - '*/src/**'
      - 'rpkg/src/rust/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          install-r: true

      - uses: dtolnay/rust-toolchain@nightly

      - name: Build rustdoc (workspace crates)
        env:
          RUSTFLAGS: --cfg=docsrs
          RUSTDOCFLAGS: --cfg=docsrs -Z unstable-options --document-private-items
        run: cargo doc --no-deps -Z rustdoc-map -p miniextendr-api -p miniextendr-macros -p miniextendr-macros-core -p miniextendr-lint

      - name: Install autoconf
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install cargo-revendor
        run: cargo install --path cargo-revendor

      - name: Configure and vendor rpkg
        run: |
          just configure
          just vendor

      - name: Build rustdoc (rpkg)
        env:
          RUSTFLAGS: --cfg=docsrs
          RUSTDOCFLAGS: --cfg=docsrs -Z unstable-options --document-private-items
        run: cargo doc --no-deps -Z rustdoc-map --manifest-path rpkg/src/rust/Cargo.toml

      - name: Merge rpkg rustdoc into main docs
        run: cp -rn rpkg/src/rust/target/doc/* target/doc/ 2>/dev/null || true

      - name: Install Zola
        run: |
          ZOLA_VERSION="0.19.2"
          curl -sL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv zola /usr/local/bin/

      - name: Generate manual from docs/
        run: bash scripts/docs-to-site.sh

      - name: Build Zola site
        run: cd site && zola build

      - name: Copy rustdoc into site
        run: cp -r target/doc site/public/rustdoc

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Fix permissions
        run: |
          chmod -c -R +rX "site/public" | while read line; do
            echo "::warning title=Invalid file permissions automatically fixed::$line"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
