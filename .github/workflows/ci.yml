name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  # ===========================================================================
  # Version consistency check
  # ===========================================================================
  version-check:
    name: Version Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check version consistency
        run: |
          # Extract version from Cargo.toml [workspace.package]
          CARGO_VERSION=$(sed -n '/\[workspace\.package\]/,/^\[/{ s/^version = "\(.*\)"/\1/p; }' Cargo.toml | head -1)

          # Extract version from rpkg/DESCRIPTION
          R_VERSION=$(grep '^Version:' rpkg/DESCRIPTION | sed 's/Version: //')

          echo "Cargo.toml version: $CARGO_VERSION"
          echo "DESCRIPTION version: $R_VERSION"

          # Compare (allow R dev versions like X.Y.Z.9000 to match X.Y.Z)
          CARGO_BASE=$(echo "$CARGO_VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          R_BASE=$(echo "$R_VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')

          if [ "$CARGO_BASE" != "$R_BASE" ]; then
            echo "::error::Version mismatch! Cargo.toml ($CARGO_VERSION) vs DESCRIPTION ($R_VERSION)"
            echo "Run: ./scripts/bump-version.sh $CARGO_VERSION"
            exit 1
          fi

          echo "Versions match!"


  # ===========================================================================
  # Change detection (path-based gating)
  # ===========================================================================
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      r: ${{ steps.filter.outputs.r }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Determine changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '.cargo/**'
            r:
              - 'rpkg/**'
            docs:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - 'README*'
              - 'docs/**'

  # ===========================================================================
  # Rust: Format check
  # ===========================================================================
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ===========================================================================
  # Rust: Clippy linting
  # ===========================================================================
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy
          cache-on-failure: true
      - name: Clippy (default features)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Clippy (no default features)
        run: cargo clippy --workspace --all-targets --no-default-features --locked -- -D warnings

  # ===========================================================================
  # Rust: Test matrix (multiple platforms and Rust versions)
  # ===========================================================================
  rust-test:
    name: Rust ${{ matrix.rust }} / ${{ matrix.os }}${{ matrix.arch && format(' ({0})', matrix.arch) || '' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    continue-on-error: ${{ matrix.allow_failure || false }}
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux stable: full feature coverage
          - os: Linux
            runner: ubuntu-latest
            rust: stable
            arch: x86_64
            full_features: true
          # Linux nightly: default features only, allowed to fail
          - os: Linux
            runner: ubuntu-latest
            rust: nightly
            arch: x86_64
            allow_failure: true
          # macOS ARM: default features only
          - os: macOS
            runner: macos-15
            rust: stable
            arch: arm64
          # macOS Intel: default features only
          - os: macOS
            runner: macos-15-intel
            rust: stable
            arch: x86_64
          # Windows: default features only
          - os: Windows
            runner: windows-latest
            rust: stable
            arch: x86_64

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.rust }}
          cache-on-failure: true

      # Tests already build, no need for separate cargo build steps
      - name: Test (default features)
        run: cargo test --workspace --locked

      - name: Test (all features)
        if: matrix.full_features
        run: cargo test --workspace --all-features --locked

      - name: Test (no default features)
        if: matrix.full_features
        run: cargo test --workspace --no-default-features --locked

  # ===========================================================================
  # Rust: Feature combinations
  # ===========================================================================
  rust-features:
    name: Features / ${{ matrix.features }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        features:
          - "rayon,connections,doc-lint"
          - "nonapi,rayon,connections,doc-lint"

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Sanitize cache key
        id: cache-key
        run: echo "key=features-$(echo '${{ matrix.features }}' | tr ',' '-')" >> "$GITHUB_OUTPUT"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ steps.cache-key.outputs.key }}
          cache-on-failure: true

      - name: Build
        run: cargo build -p miniextendr-api --locked --no-default-features --features "${{ matrix.features }}"

      - name: Test
        run: cargo test -p miniextendr-api --locked --no-default-features --features "${{ matrix.features }}"

  # ===========================================================================
  # Rust: Documentation build
  # ===========================================================================
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: docs
          cache-on-failure: true
      - name: Build docs
        run: cargo doc --workspace --no-deps --all-features --locked
        env:
          RUSTDOCFLAGS: -D warnings

  # ===========================================================================
  # R Package: R CMD check on Linux (container-based)
  # ===========================================================================
  r-check-linux:
    name: R CMD check / Linux ${{ matrix.r }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: ${{ matrix.allow_failure || false }}
    needs: changes
    if: needs.changes.outputs.r == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - r: release
          - r: devel
            allow_failure: true  # R-devel may break for upstream reasons
          - r: oldrel-1

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      NOT_CRAN: true

    steps:
      - uses: actions/checkout@v6

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          shared-key: r-linux-${{ matrix.r }}
          cache-on-failure: true

      - name: Configure Linux
        run: |
          echo "LD_LIBRARY_PATH=$(R -s -e 'cat(normalizePath(R.home()))')/lib" >> $GITHUB_ENV

      - name: Configure
        working-directory: rpkg
        run: |
          chmod +x configure
          ./configure

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: rpkg
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
          check-dir: '"check"'

      - name: Print failed tests
        if: always()
        run: |
          for f in rpkg/check/*.Rcheck/tests/*.Rout.fail; do
            [ -f "$f" ] && echo "=== $f ===" && tail -n100 "$f"
          done || true

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: logs-linux-r${{ matrix.r }}
          path: |
            rpkg/check
            rpkg/config.log
          retention-days: 7

  # ===========================================================================
  # R Package: R CMD check on macOS
  # ===========================================================================
  r-check-macos:
    name: R CMD check / macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    needs: changes
    if: needs.changes.outputs.r == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM (Apple Silicon)
          - runner: macos-15
            arch: arm64
          # macOS Intel
          - runner: macos-15-intel
            arch: x86_64

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      NOT_CRAN: true

    steps:
      - uses: actions/checkout@v6

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          shared-key: r-macos-${{ matrix.arch }}
          cache-on-failure: true

      - name: Configure
        working-directory: rpkg
        run: |
          chmod +x configure
          ./configure

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: rpkg
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
          check-dir: '"check"'

      - name: Print failed tests
        if: always()
        run: |
          for f in rpkg/check/*.Rcheck/tests/*.Rout.fail; do
            [ -f "$f" ] && echo "=== $f ===" && tail -n100 "$f"
          done || true

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: logs-macos-${{ matrix.arch }}
          path: |
            rpkg/check
            rpkg/config.log
          retention-days: 7

  # ===========================================================================
  # R Package: R CMD check on Windows
  # ===========================================================================
  r-check-windows:
    name: R CMD check / Windows
    runs-on: windows-latest
    timeout-minutes: 90
    needs: changes
    if: needs.changes.outputs.r == 'true'
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      NOT_CRAN: true

    steps:
      - uses: actions/checkout@v6

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          rtools-version: '44'
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          shared-key: r-windows
          cache-on-failure: true

      - name: Configure Windows Rust
        shell: pwsh
        run: |
          $rtools_home = "C:\rtools44"

          # Add Rtools to PATH
          echo "${rtools_home}\x86_64-w64-mingw32.static.posix\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "${rtools_home}\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "$(Rscript.exe -e 'cat(normalizePath(R.home()))')\bin\x64" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          # Create empty libgcc stubs for Rust linking
          New-Item -Path libgcc_mock -Type Directory -Force
          New-Item -Path libgcc_mock\libgcc_eh.a -Type File -Force
          New-Item -Path libgcc_mock\libgcc_s.a -Type File -Force

          # Configure Cargo for Windows GNU target
          New-Item -Path .cargo -ItemType Directory -Force
          $pwd_slash = echo "${PWD}" | % {$_ -replace '\\','/'}
          @"
          [target.x86_64-pc-windows-gnu]
          linker = "x86_64-w64-mingw32.static.posix-gcc.exe"

          [env]
          LIBRARY_PATH = "${pwd_slash}/libgcc_mock"
          "@ | Out-File -FilePath .cargo/config.toml -Encoding utf8 -Append

      - name: Configure
        working-directory: rpkg
        shell: bash
        run: |
          if [ -f configure.win ]; then
            chmod +x configure.win
            ./configure.win
          fi

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: rpkg
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
          check-dir: '"check"'

      - name: Print failed tests
        if: always()
        shell: bash
        run: |
          for f in rpkg/check/*.Rcheck/tests/*.Rout.fail; do
            [ -f "$f" ] && echo "=== $f ===" && tail -n100 "$f"
          done || true

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: logs-windows
          path: |
            rpkg/check
          retention-days: 7

  # ===========================================================================
  # R Package: Test suite
  # ===========================================================================
  r-tests:
    name: R tests / ${{ matrix.os }}${{ matrix.arch && format(' ({0})', matrix.arch) || '' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.r == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Linux
            runner: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: true

    steps:
      - uses: actions/checkout@v6

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::testthat
          needs: check

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          shared-key: r-tests-${{ matrix.os }}-${{ matrix.arch || 'default' }}
          cache-on-failure: true

      - name: Configure
        working-directory: rpkg
        run: |
          chmod +x configure
          ./configure

      - name: Install package
        working-directory: rpkg
        shell: bash
        run: R CMD INSTALL .

      - name: Run tests
        working-directory: rpkg
        shell: bash
        run: Rscript -e "testthat::test_local()"

  # ===========================================================================
  # CRAN-like check (stricter, simulates CRAN environment)
  # ===========================================================================
  cran-check:
    name: CRAN-like check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: changes
    if: needs.changes.outputs.r == 'true'
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # NOT_CRAN is NOT set - simulates CRAN environment

    steps:
      - uses: actions/checkout@v6

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          shared-key: cran-check
          cache-on-failure: true

      - name: Configure Linux
        run: |
          echo "LD_LIBRARY_PATH=$(R -s -e 'cat(normalizePath(R.home()))')/lib" >> $GITHUB_ENV

      - name: Vendor dependencies (CRAN simulation)
        working-directory: rpkg/src/rust
        run: |
          mkdir -p ../vendor
          cargo vendor --locked ../vendor

      - name: Configure
        working-directory: rpkg
        run: |
          chmod +x configure
          ./configure

      - name: R CMD check (CRAN-like)
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: rpkg
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"warning"'
          check-dir: '"check"'

      - name: Print failed tests
        if: always()
        run: |
          for f in rpkg/check/*.Rcheck/tests/*.Rout.fail; do
            [ -f "$f" ] && echo "=== $f ===" && tail -n100 "$f"
          done || true

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: logs-cran-check
          path: |
            rpkg/check
            rpkg/config.log
          retention-days: 7

  # ===========================================================================
  # Minimum Supported Rust Version check
  # ===========================================================================
  msrv:
    name: MSRV Check (Rust 1.85)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Install MSRV Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv
          cache-on-failure: true

      - name: Check MSRV
        run: cargo check --workspace --all-features --locked

  # ===========================================================================
  # Benchmarks (run but don't fail on regression)
  # ===========================================================================
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    env:
      NOT_CRAN: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: benchmarks
          cache-on-failure: true

      - name: Configure Linux
        run: |
          echo "LD_LIBRARY_PATH=$(R -s -e 'cat(normalizePath(R.home()))')/lib" >> $GITHUB_ENV

      - name: Build benchmarks
        run: cargo build --release -p miniextendr-bench --locked

      # Note: Actually running benchmarks requires R to be embedded,
      # which needs the package installed. We just verify they compile.

  # ===========================================================================
  # Summary job (for branch protection)
  # ===========================================================================
  ci-success:
    name: CI Success
    needs:
      - version-check
      - changes
      - fmt
      - clippy
      - rust-test
      - rust-features
      - docs
      - r-check-linux
      - r-check-macos
      - r-check-windows
      - r-tests
      - cran-check
      - benchmarks
      - msrv
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results=(
            "${{ needs.version-check.result }}"
            "${{ needs.fmt.result }}"
            "${{ needs.clippy.result }}"
            "${{ needs.rust-test.result }}"
            "${{ needs.rust-features.result }}"
            "${{ needs.docs.result }}"
            "${{ needs.r-check-linux.result }}"
            "${{ needs.r-check-macos.result }}"
            "${{ needs.r-check-windows.result }}"
            "${{ needs.r-tests.result }}"
            "${{ needs.cran-check.result }}"
            "${{ needs.benchmarks.result }}"
            "${{ needs.msrv.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "One or more jobs failed: $result"
              exit 1
            fi
          done
          echo "All CI jobs passed!"
