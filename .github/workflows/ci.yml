name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # CARGO_INCREMENTAL=0 — sccache can't cache rustc outputs when Cargo's
  # incremental compilation embeds per-invocation unique hashes into crate
  # metadata. With incremental off, rustc outputs are deterministic and
  # sccache hit rates jump from ~50% to near-100% across workspace crates.
  # See CLAUDE.md "sccache and [profile.dev] incremental" for details.
  CARGO_INCREMENTAL: "0"

jobs:
  # ===========================================================================
  # Generated file hygiene check
  # ===========================================================================
  generated-files-check:
    name: Generated Files Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for committed generated files
        run: |
          # Files that should NOT be tracked in git (generated by configure)
          # NOTE: Cargo.toml and stub.c ARE intentionally tracked — they enable
          # cargo check / R CMD build without running configure first.
          generated_files=(
            "rpkg/src/Makevars"
            "rpkg/src/rust/.cargo/config.toml"
          )

          # Directories that should NOT be tracked
          generated_dirs=(
            "rpkg/src/rust/target"
            "rpkg/src/rust/ra_target"
            "rpkg/src/rust/.cargo"
            "rpkg/vendor"
          )

          failed=0

          echo "Checking for generated files that should not be committed..."
          for f in "${generated_files[@]}"; do
            if git ls-files --error-unmatch "$f" &>/dev/null; then
              echo "::error::Generated file '$f' is tracked in git. Remove it with: git rm --cached $f"
              failed=1
            fi
          done

          echo "Checking for generated directories that should not be committed..."
          for d in "${generated_dirs[@]}"; do
            if git ls-files -- "$d" | grep -q .; then
              echo "::error::Generated directory '$d' is tracked in git. Remove it with: git rm -r --cached $d"
              failed=1
            fi
          done

          if [ "$failed" -eq 0 ]; then
            echo "No generated files found in git tracking."
          else
            echo ""
            echo "These files are generated by 'just configure' and should not be committed."
            echo "Add them to .gitignore if not already present."
            exit 1
          fi

  # ===========================================================================
  # Version consistency check
  # ===========================================================================
  version-check:
    name: Version Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install just
        uses: taiki-e/install-action@just

      - name: Check version consistency
        run: |
          # Extract version from Cargo.toml [workspace.package]
          CARGO_VERSION=$(sed -n '/\[workspace\.package\]/,/^\[/{ s/^version = "\(.*\)"/\1/p; }' Cargo.toml | head -1)

          # Extract version from rpkg/DESCRIPTION
          R_VERSION=$(grep '^Version:' rpkg/DESCRIPTION | sed 's/Version: //')

          echo "Cargo.toml version: $CARGO_VERSION"
          echo "DESCRIPTION version: $R_VERSION"

          # Compare (allow R dev versions like X.Y.Z.9000 to match X.Y.Z)
          CARGO_BASE=$(echo "$CARGO_VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          R_BASE=$(echo "$R_VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')

          if [ "$CARGO_BASE" != "$R_BASE" ]; then
            echo "::error::Version mismatch! Cargo.toml ($CARGO_VERSION) vs DESCRIPTION ($R_VERSION)"
            echo "Run: ./scripts/bump-version.sh $CARGO_VERSION"
            exit 1
          fi

          echo "Versions match!"

  # ===========================================================================
  # Sync checks (vendor, templates, lint parser)
  # ===========================================================================
  sync-checks:
    name: Sync Checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.r == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install autoconf
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-revendor
        run: cargo install --path cargo-revendor

      - name: Configure and vendor
        run: |
          just configure
          just vendor

      - name: Check vendor sync
        run: just vendor-sync-check

      - name: Check templates sync
        run: just templates-check

      - name: Check lint parser sync
        run: just lint-sync-check

  # ===========================================================================
  # Rust lint (rustfmt + clippy) — runs independently of R CMD check
  # ===========================================================================
  rust-lint:
    name: Rust lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - uses: actions/checkout@v6

      # miniextendr-api/build.rs calls `R RHOME` (or reads $R_HOME) to resolve
      # libR's location, which only matters at link time. Lint steps (fmt +
      # clippy) never link, so pointing R_HOME at an existing dummy directory
      # satisfies build.rs's existence check without installing R. Saves ~1 min
      # of setup-r time on every lint run.
      - name: Set dummy R_HOME
        run: echo "R_HOME=$RUNNER_TEMP" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-lint
          cache-on-failure: true

      - name: Rustfmt
        id: rustfmt
        continue-on-error: true
        run: cargo fmt --all -- --check 2>&1 | tee "$RUNNER_TEMP/rustfmt.log"
        shell: bash

      - name: Clippy (default features)
        id: clippy_default
        continue-on-error: true
        run: cargo clippy --workspace --all-targets --locked -- -D warnings 2>&1 | tee "$RUNNER_TEMP/clippy_default.log"
        shell: bash

      - name: Clippy (all features)
        id: clippy_all
        continue-on-error: true
        # NOTE: Can't use `--features full` — the `full` feature in
        # miniextendr-api omits the forwarding features we want checked
        # (default-r6/-strict/-coerce/-worker, nonapi, connections) and adds
        # heavy deps (arrow, datafusion, log) we don't need here. Keep the
        # explicit list so CI signal matches what rpkg actually enables.
        run: >-
          cargo clippy --workspace --all-targets --locked
          --features rayon,rand,rand_distr,either,ndarray,nalgebra,serde,serde_json,num-bigint,rust_decimal,ordered-float,uuid,regex,indexmap,time,num-traits,bytes,num-complex,url,sha2,bitflags,bitvec,aho-corasick,toml,tabled,raw_conversions,vctrs,tinyvec,borsh,connections,nonapi,default-strict,default-coerce,default-r6,default-worker
          -- -D warnings 2>&1 | tee "$RUNNER_TEMP/clippy_all.log"
        shell: bash

      - name: Fail if any Rust check failed
        if: always()
        shell: bash
        run: |
          set -uo pipefail
          failed=0

          rustfmt="${{ steps.rustfmt.outcome }}"
          clippy_default="${{ steps.clippy_default.outcome }}"
          clippy_all="${{ steps.clippy_all.outcome }}"

          echo "rustfmt:         $rustfmt"
          echo "clippy_default:  $clippy_default"
          echo "clippy_all:      $clippy_all"
          echo

          dump_failed() {
            local name="$1" outcome="$2" log="$RUNNER_TEMP/$1.log"
            if [[ "$outcome" != "success" ]]; then
              echo "::group::$name failure output"
              if [[ -f "$log" ]]; then
                cat "$log"
              else
                echo "(no log captured for $name)"
              fi
              echo "::endgroup::"
              failed=1
            fi
          }

          dump_failed rustfmt         "$rustfmt"
          dump_failed clippy_default  "$clippy_default"
          dump_failed clippy_all      "$clippy_all"

          if [[ "$failed" -ne 0 ]]; then
            echo "::error::One or more Rust checks failed (output dumped above)"
            exit 1
          fi

  # ===========================================================================
  # Change detection (path-based gating)
  # ===========================================================================
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      r: ${{ steps.filter.outputs.r }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Determine changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            rust:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '.cargo/**'
              - '.github/workflows/**'
              - 'justfile'
            r:
              - 'rpkg/**'
              - 'minirextendr/**'
              - 'tests/cross-package/**'
              - 'miniextendr-api/**'
              - 'miniextendr-macros/**'
              - 'miniextendr-engine/**'
              - 'miniextendr-lint/**'
              - '**/*.R'
              - '**/*.r'
              - '**/configure.ac'
              - '**/configure'
              - '**/*.in'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '.cargo/**'
              - '.github/workflows/**'
              - 'justfile'
            docs:
              - 'rpkg/man/**'
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - 'README*'
              - 'docs/**'

  # ===========================================================================
  # R Package: R CMD check on Linux
  # ===========================================================================
  r-check-linux:
    name: R CMD check / Linux ${{ matrix.r }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: ${{ matrix.allow_failure || false }}
    needs: changes
    if: needs.changes.outputs.r == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - r: release
          - r: devel
            allow_failure: true # R-devel may break for upstream reasons
          - r: oldrel-1

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install autoconf
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          shared-key: r-linux-${{ matrix.r }}
          cache-on-failure: true

      - name: Configure Linux
        run: |
          echo "LD_LIBRARY_PATH=$(R -s -e 'cat(R.home(\"lib\"))')" >> $GITHUB_ENV

      - name: Install cargo-revendor
        run: cargo install --path cargo-revendor

      - name: Configure and vendor
        run: |
          just configure
          just vendor

      # NOTE: Cargo tests are disabled due to stack overflow issues on Linux CI.
      # The R package functionality is already tested via R CMD check below.
      # To re-enable, uncomment and fix the stack overflow issue.
      # - name: Tests (default features)
      #   id: cargo_tests
      #   if: matrix.r == 'release'
      #   continue-on-error: true
      #   run: cargo test --workspace --locked --lib

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: rpkg
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
          check-dir: '"check"'
        env:
          NOT_CRAN: false

      - name: Print failed tests
        if: always()
        run: |
          for f in rpkg/check/*.Rcheck/tests/*.Rout.fail; do
            [ -f "$f" ] && echo "=== $f ===" && tail -n100 "$f"
          done || true

      - name: Print 00check.log and 00install.out
        if: always()
        run: |
          echo "=== 00install.out ==="
          cat rpkg/check/*.Rcheck/00install.out 2>/dev/null || echo "00install.out not found"
          echo ""
          echo "=== 00check.log ==="
          cat rpkg/check/*.Rcheck/00check.log 2>/dev/null || echo "00check.log not found"

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: logs-linux-r${{ matrix.r }}
          path: |
            rpkg/check
            rpkg/config.log
          retention-days: 7

