name: CI

on: [push, pull_request]

concurrency:
  group: ${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ===========================================================================
  # Version consistency check
  # ===========================================================================
  version-check:
    name: Version Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          # Extract version from Cargo.toml [workspace.package]
          CARGO_VERSION=$(sed -n '/\[workspace\.package\]/,/^\[/{ s/^version = "\(.*\)"/\1/p; }' Cargo.toml | head -1)

          # Extract version from rpkg/DESCRIPTION
          R_VERSION=$(grep '^Version:' rpkg/DESCRIPTION | sed 's/Version: //')

          echo "Cargo.toml version: $CARGO_VERSION"
          echo "DESCRIPTION version: $R_VERSION"

          # Compare (allow R dev versions like X.Y.Z.9000 to match X.Y.Z)
          CARGO_BASE=$(echo "$CARGO_VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          R_BASE=$(echo "$R_VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')

          if [ "$CARGO_BASE" != "$R_BASE" ]; then
            echo "::error::Version mismatch! Cargo.toml ($CARGO_VERSION) vs DESCRIPTION ($R_VERSION)"
            echo "Run: ./scripts/bump-version.sh $CARGO_VERSION"
            exit 1
          fi

          echo "Versions match!"

  # ===========================================================================
  # Rust: Format check
  # ===========================================================================
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ===========================================================================
  # Rust: Clippy linting
  # ===========================================================================
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Clippy (no default features)
        run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings

  # ===========================================================================
  # Rust: Test matrix (multiple platforms and Rust versions)
  # ===========================================================================
  rust-test:
    name: Rust ${{ matrix.rust }} / ${{ matrix.os }}${{ matrix.arch && format(' ({0})', matrix.arch) || '' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux Intel: stable, MSRV, nightly
          - os: Linux
            runner: ubuntu-latest
            rust: stable
            arch: x86_64
          - os: Linux
            runner: ubuntu-latest
            rust: "1.85"  # MSRV (edition 2024)
            arch: x86_64
          - os: Linux
            runner: ubuntu-latest
            rust: nightly
            arch: x86_64
          # macOS ARM (Apple Silicon)
          - os: macOS
            runner: macos-latest
            rust: stable
            arch: arm64
          # macOS Intel
          - os: macOS
            runner: macos-15-intel
            rust: stable
            arch: x86_64
          # Windows Intel
          - os: Windows
            runner: windows-latest
            rust: stable
            arch: x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.rust }}

      - name: Build (default features)
        run: cargo build --workspace

      - name: Test (default features)
        run: cargo test --workspace

      - name: Build (all features)
        run: cargo build --workspace --all-features

      - name: Test (all features)
        run: cargo test --workspace --all-features

      - name: Build (no default features)
        run: cargo build --workspace --no-default-features

      - name: Test (no default features)
        run: cargo test --workspace --no-default-features

  # ===========================================================================
  # Rust: Feature combinations
  # ===========================================================================
  rust-features:
    name: Features / ${{ matrix.features }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        features:
          - "rayon,connections,doc-lint"
          - "nonapi,rayon,connections,doc-lint"

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Sanitize cache key
        id: cache-key
        run: echo "key=features-$(echo '${{ matrix.features }}' | tr ',' '-')" >> "$GITHUB_OUTPUT"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ steps.cache-key.outputs.key }}

      - name: Build
        run: cargo build -p miniextendr-api --no-default-features --features "${{ matrix.features }}"

      - name: Test
        run: cargo test -p miniextendr-api --no-default-features --features "${{ matrix.features }}"

  # ===========================================================================
  # Rust: Documentation build
  # ===========================================================================
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  # ===========================================================================
  # R Package: R CMD check on Linux (container-based)
  # ===========================================================================
  r-check-linux:
    name: R CMD check / Linux ${{ matrix.r }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - r: release
            container: ghcr.io/r-lib/actions/setup-r-dependencies:2-latest
          - r: devel
            container: ghcr.io/r-lib/actions/setup-r-dependencies:2-latest
          - r: oldrel-1
            container: ghcr.io/r-lib/actions/setup-r-dependencies:2-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      NOT_CRAN: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          key: r-linux-${{ matrix.r }}

      - name: Configure
        working-directory: rpkg
        run: |
          chmod +x configure
          ./configure

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: rpkg
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
          check-dir: '"check"'

      - name: Print failed tests
        if: always()
        run: |
          for f in rpkg/check/*.Rcheck/tests/*.Rout.fail; do
            [ -f "$f" ] && echo "=== $f ===" && tail -n100 "$f"
          done || true

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-linux-r${{ matrix.r }}
          path: |
            rpkg/check
            rpkg/config.log
          retention-days: 7

  # ===========================================================================
  # R Package: R CMD check on macOS
  # ===========================================================================
  r-check-macos:
    name: R CMD check / macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM (Apple Silicon)
          - runner: macos-latest
            arch: arm64
          # macOS Intel
          - runner: macos-15-intel
            arch: x86_64

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      NOT_CRAN: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          key: r-macos-${{ matrix.arch }}

      - name: Configure
        working-directory: rpkg
        run: |
          chmod +x configure
          ./configure

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: rpkg
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
          check-dir: '"check"'

      - name: Print failed tests
        if: always()
        run: |
          for f in rpkg/check/*.Rcheck/tests/*.Rout.fail; do
            [ -f "$f" ] && echo "=== $f ===" && tail -n100 "$f"
          done || true

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-macos-${{ matrix.arch }}
          path: |
            rpkg/check
            rpkg/config.log
          retention-days: 7

  # ===========================================================================
  # R Package: R CMD check on Windows
  # ===========================================================================
  r-check-windows:
    name: R CMD check / Windows
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      NOT_CRAN: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          key: r-windows

      - name: Configure
        working-directory: rpkg
        shell: bash
        run: |
          if [ -f configure.win ]; then
            chmod +x configure.win
            ./configure.win
          fi

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: rpkg
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
          check-dir: '"check"'

      - name: Print failed tests
        if: always()
        shell: bash
        run: |
          for f in rpkg/check/*.Rcheck/tests/*.Rout.fail; do
            [ -f "$f" ] && echo "=== $f ===" && tail -n100 "$f"
          done || true

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-windows
          path: |
            rpkg/check
          retention-days: 7

  # ===========================================================================
  # R Package: Test suite
  # ===========================================================================
  r-tests:
    name: R tests / ${{ matrix.os }}${{ matrix.arch && format(' ({0})', matrix.arch) || '' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Linux
            runner: ubuntu-latest
          - os: macOS
            runner: macos-latest
            arch: arm64
          - os: macOS
            runner: macos-15-intel
            arch: x86_64
          - os: Windows
            runner: windows-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::testthat
          needs: check

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          key: r-tests-${{ matrix.os }}-${{ matrix.arch || 'default' }}

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        working-directory: rpkg
        run: |
          chmod +x configure
          ./configure

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        working-directory: rpkg
        shell: bash
        run: |
          if [ -f configure.win ]; then
            chmod +x configure.win
            ./configure.win
          fi

      - name: Install package
        working-directory: rpkg
        shell: bash
        run: R CMD INSTALL .

      - name: Run tests
        working-directory: rpkg
        shell: bash
        run: Rscript -e "testthat::test_local()"

  # ===========================================================================
  # CRAN-like check (stricter, simulates CRAN environment)
  # ===========================================================================
  cran-check:
    name: CRAN-like check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # NOT_CRAN is NOT set - simulates CRAN environment

    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          key: cran-check

      - name: Vendor dependencies (CRAN simulation)
        working-directory: rpkg/src/rust
        run: |
          mkdir -p ../vendor
          cargo vendor ../vendor > /dev/null 2>&1 || true

      - name: Configure
        working-directory: rpkg
        run: |
          chmod +x configure
          ./configure

      - name: R CMD check (CRAN-like)
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: rpkg
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"warning"'
          check-dir: '"check"'

      - name: Print failed tests
        if: always()
        run: |
          for f in rpkg/check/*.Rcheck/tests/*.Rout.fail; do
            [ -f "$f" ] && echo "=== $f ===" && tail -n100 "$f"
          done || true

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-cran-check
          path: |
            rpkg/check
            rpkg/config.log
          retention-days: 7

  # ===========================================================================
  # Minimum Supported Rust Version check
  # ===========================================================================
  msrv:
    name: MSRV Check (Rust 1.85)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install MSRV Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"

      - uses: Swatinem/rust-cache@v2

      - name: Check MSRV
        run: cargo check --workspace --all-features

  # ===========================================================================
  # Benchmarks (run but don't fail on regression)
  # ===========================================================================
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NOT_CRAN: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: benchmarks

      - name: Build benchmarks
        run: cargo build --release -p miniextendr-bench

      # Note: Actually running benchmarks requires R to be embedded,
      # which needs the package installed. We just verify they compile.

  # ===========================================================================
  # Summary job (for branch protection)
  # ===========================================================================
  ci-success:
    name: CI Success
    needs:
      - version-check
      - fmt
      - clippy
      - rust-test
      - rust-features
      - docs
      - r-check-linux
      - r-check-macos
      - r-check-windows
      - r-tests
      - msrv
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results=(
            "${{ needs.version-check.result }}"
            "${{ needs.fmt.result }}"
            "${{ needs.clippy.result }}"
            "${{ needs.rust-test.result }}"
            "${{ needs.rust-features.result }}"
            "${{ needs.docs.result }}"
            "${{ needs.r-check-linux.result }}"
            "${{ needs.r-check-macos.result }}"
            "${{ needs.r-check-windows.result }}"
            "${{ needs.r-tests.result }}"
            "${{ needs.msrv.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "One or more jobs failed: $result"
              exit 1
            fi
          done
          echo "All CI jobs passed!"
