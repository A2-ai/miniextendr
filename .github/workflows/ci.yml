name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ===========================================================================
  # Version consistency check
  # ===========================================================================
  version-check:
    name: Version Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check version consistency
        shell: bash
        run: |
          CARGO_VERSION=$(sed -n '/\[workspace\.package\]/,/^\[/{ s/^version = "\(.*\)"/\1/p; }' Cargo.toml | head -1)
          R_VERSION=$(grep '^Version:' rpkg/DESCRIPTION | sed 's/Version: //')
          echo "Cargo.toml version: $CARGO_VERSION"
          echo "DESCRIPTION version: $R_VERSION"
          CARGO_BASE=$(echo "$CARGO_VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          R_BASE=$(echo "$R_VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          if [ "$CARGO_BASE" != "$R_BASE" ]; then
            echo "::error::Version mismatch! Cargo.toml ($CARGO_VERSION) vs DESCRIPTION ($R_VERSION)"
            exit 1
          fi
          echo "Versions match!"

  # ===========================================================================
  # Change detection (NO GitHub API; works on forks too)
  # ===========================================================================
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      minirextendr: ${{ steps.diff.outputs.minirextendr }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute diff
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          echo "Base: $base"
          echo "Head: $head"

          changed="$(git diff --name-only "$base" "$head" || true)"
          echo "$changed"

          if echo "$changed" | grep -qE '^minirextendr/'; then
            echo "minirextendr=true" >> "$GITHUB_OUTPUT"
          else
            echo "minirextendr=false" >> "$GITHUB_OUTPUT"
          fi

  # ===========================================================================
  # R CMD check + Rust tests on Linux (ALL R versions)
  # ===========================================================================
  r-check-linux:
    name: Linux / R ${{ matrix.r }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    continue-on-error: ${{ matrix.allow_failure || false }}
    needs: [version-check, changes]
    strategy:
      fail-fast: false
      matrix:
        include:
          - r: release
          - r: devel
            allow_failure: true
          - r: oldrel-1

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      NOT_CRAN: true
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - uses: actions/checkout@v6

      - name: Install just
        shell: bash
        run: |
          mkdir -p ~/.local/bin
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - name: Setup rpkg dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::rcmdcheck any::devtools any::testthat
          needs: check

      - name: Setup minirextendr dependencies (if changed)
        if: needs.changes.outputs.minirextendr == 'true'
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: minirextendr
          extra-packages: any::devtools any::testthat
          needs: check

      - name: Install autoconf
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-${{ matrix.r }}
          cache-on-failure: true

      - name: Configure Linux linker env
        shell: bash
        run: |
          echo "LD_LIBRARY_PATH=$(R -s -e 'cat(normalizePath(R.home()))')/lib" >> $GITHUB_ENV

      # REQUIRED ORDER
      - name: Configure (rpkg)
        shell: bash
        run: just configure

      - name: Cargo tests (workspace + rpkg Rust)
        shell: bash
        run: just test --locked

      - name: devtools::test(rpkg)
        shell: bash
        run: just devtools-test

      - name: R CMD check (rpkg)
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: rpkg
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
          check-dir: '"check"'

      - name: devtools::test(minirextendr) (if changed)
        if: needs.changes.outputs.minirextendr == 'true'
        shell: bash
        run: Rscript -e 'devtools::test("minirextendr")'

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: logs-linux-r${{ matrix.r }}
          path: |
            rpkg/check
            rpkg/config.log
          retention-days: 7

  # ===========================================================================
  # R CMD check + Rust tests on macOS (ALL R versions, both arch runners)
  # ===========================================================================
  r-check-macos:
    name: macOS / ${{ matrix.arch }} / R ${{ matrix.r }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    continue-on-error: ${{ matrix.allow_failure || false }}
    needs: [version-check, changes]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            r: release
          - runner: macos-15
            arch: arm64
            r: devel
            allow_failure: true
          - runner: macos-15
            arch: arm64
            r: oldrel-1
          - runner: macos-15-intel
            arch: x86_64
            r: release
          - runner: macos-15-intel
            arch: x86_64
            r: devel
            allow_failure: true
          - runner: macos-15-intel
            arch: x86_64
            r: oldrel-1

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      NOT_CRAN: true
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - uses: actions/checkout@v6

      - name: Install just
        shell: bash
        run: |
          brew install just
          echo "$(brew --prefix)/bin" >> $GITHUB_PATH

      - name: Install autoconf
        shell: bash
        run: |
          brew install autoconf

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - name: Setup rpkg dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::rcmdcheck any::devtools any::testthat
          needs: check

      - name: Setup minirextendr dependencies (if changed)
        if: needs.changes.outputs.minirextendr == 'true'
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: minirextendr
          extra-packages: any::devtools any::testthat
          needs: check

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-${{ matrix.arch }}-${{ matrix.r }}
          cache-on-failure: true

      # REQUIRED ORDER
      - name: Configure (rpkg)
        shell: bash
        run: just configure

      - name: Cargo tests (workspace + rpkg Rust)
        shell: bash
        run: just test --locked

      - name: devtools::test(rpkg)
        shell: bash
        run: just devtools-test

      - name: R CMD check (rpkg)
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: rpkg
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
          check-dir: '"check"'

      - name: devtools::test(minirextendr) (if changed)
        if: needs.changes.outputs.minirextendr == 'true'
        shell: bash
        run: Rscript -e 'devtools::test("minirextendr")'

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: logs-macos-${{ matrix.arch }}-r${{ matrix.r }}
          path: |
            rpkg/check
            rpkg/config.log
          retention-days: 7

  # ===========================================================================
  # R CMD check + Rust tests on Windows (ALL R versions)
  # ===========================================================================
  r-check-windows:
    name: Windows / R ${{ matrix.r }}
    runs-on: windows-latest
    timeout-minutes: 120
    continue-on-error: ${{ matrix.allow_failure || false }}
    needs: [version-check, changes]
    strategy:
      fail-fast: false
      matrix:
        include:
          - r: release
          - r: devel
            allow_failure: true
          - r: oldrel-1

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      NOT_CRAN: true
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - uses: actions/checkout@v6

      - name: Install just
        shell: pwsh
        run: |
          choco install just -y

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          rtools-version: '44'
          use-public-rspm: true

      - name: Setup rpkg dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::rcmdcheck any::devtools any::testthat
          needs: check

      - name: Setup minirextendr dependencies (if changed)
        if: needs.changes.outputs.minirextendr == 'true'
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: minirextendr
          extra-packages: any::devtools any::testthat
          needs: check

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-${{ matrix.r }}
          cache-on-failure: true

      # Put Rtools (autoconf etc) on PATH and write .cargo/config.toml for GNU linker + patch.crates-io
      - name: Configure Windows toolchain + Cargo config
        shell: pwsh
        run: |
          $rtools_home = "C:\rtools44"
          "${rtools_home}\x86_64-w64-mingw32.static.posix\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "${rtools_home}\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          New-Item -Path libgcc_mock -Type Directory -Force | Out-Null
          New-Item -Path libgcc_mock\libgcc_eh.a -Type File -Force | Out-Null
          New-Item -Path libgcc_mock\libgcc_s.a -Type File -Force | Out-Null

          New-Item -Path .cargo -ItemType Directory -Force | Out-Null
          $pwd_slash = "${PWD}" -replace '\\','/'

          @"
          [target.x86_64-pc-windows-gnu]
          linker = "x86_64-w64-mingw32.static.posix-gcc.exe"

          [env]
          LIBRARY_PATH = "${pwd_slash}/libgcc_mock"

          [patch.crates-io]
          miniextendr-api = { path = "miniextendr-api" }
          miniextendr-macros = { path = "miniextendr-macros" }
          miniextendr-lint = { path = "miniextendr-lint" }
          miniextendr-engine = { path = "miniextendr-engine" }
          miniextendr-bench = { path = "miniextendr-bench" }
          "@ | Out-File -FilePath .cargo/config.toml -Encoding utf8

      # REQUIRED ORDER
      - name: Configure (rpkg)
        shell: bash
        run: just configure

      - name: Cargo tests (workspace + rpkg Rust)
        shell: bash
        run: just test --locked

      - name: devtools::test(rpkg)
        shell: bash
        run: just devtools-test

      - name: R CMD check (rpkg)
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: rpkg
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
          check-dir: '"check"'

      - name: devtools::test(minirextendr) (if changed)
        if: needs.changes.outputs.minirextendr == 'true'
        shell: bash
        run: Rscript -e 'devtools::test("minirextendr")'

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: logs-windows-r${{ matrix.r }}
          path: |
            rpkg/check
          retention-days: 7

  # ===========================================================================
  # Summary job
  # ===========================================================================
  ci-success:
    name: CI Success
    needs:
      - version-check
      - changes
      - r-check-linux
      - r-check-macos
      - r-check-windows
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        shell: bash
        run: |
          results=(
            "${{ needs.version-check.result }}"
            "${{ needs.changes.result }}"
            "${{ needs.r-check-linux.result }}"
            "${{ needs.r-check-macos.result }}"
            "${{ needs.r-check-windows.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "One or more jobs failed: $result"
              exit 1
            fi
          done
          echo "All CI jobs passed!"
