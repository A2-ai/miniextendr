  # ===========================================================================
  # R Package: Test suite (Linux only)
  # ===========================================================================
  r-tests:
    name: R tests / Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.r == 'true'

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::testthat
          needs: check

      - name: Install autoconf
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          shared-key: r-tests
          cache-on-failure: true

      - name: Install cargo-revendor
        run: cargo install --path cargo-revendor

      - name: Configure and vendor
        run: |
          just configure
          just vendor

      - name: Install package
        working-directory: rpkg
        shell: bash
        run: R CMD INSTALL .

      - name: Run tests
        working-directory: rpkg
        shell: bash
        run: Rscript -e "testthat::test_local()"

      - name: Run tests with heap checking (3 rounds, randomized order)
        working-directory: rpkg
        shell: bash
        env:
          # MALLOC_CHECK_=3: glibc checks heap consistency on every malloc/free
          # and aborts immediately on corruption (not lazily). This catches
          # heap-corrupting UB at the point it happens, not later.
          MALLOC_CHECK_: "3"
          # MALLOC_PERTURB_: fills freed memory with a non-zero pattern,
          # making use-after-free crashes deterministic instead of sporadic.
          MALLOC_PERTURB_: "165"
        run: |
          for i in 1 2 3; do
            echo "=== Heap-checked test run $i/3 ==="
            Rscript -e "testthat::test_local()" || exit 1
          done

      - name: Run ALTREP tests under Valgrind
        if: always()
        working-directory: rpkg
        shell: bash
        run: |
          sudo apt-get install -y valgrind 2>/dev/null || true
          if command -v valgrind &>/dev/null; then
            echo "=== Valgrind memcheck on ALTREP materialization ==="
            R -d "valgrind --tool=memcheck --leak-check=full --track-origins=yes --error-exitcode=1" \
              -e 'library(miniextendr); testthat::test_local(filter = "altrep-materialization")' \
              2>&1 | tee /tmp/valgrind.log || true
            echo "=== Valgrind summary ==="
            grep -A 5 "ERROR SUMMARY\|Invalid read\|Invalid write\|Use of uninitialised" /tmp/valgrind.log || echo "No errors found"
          else
            echo "Valgrind not available, skipping"
          fi

  # ===========================================================================
  # Cross-package trait ABI tests
  # ===========================================================================
  cross-package-tests:
    name: Cross-Package Trait ABI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.r == 'true'
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::testthat, any::devtools
          needs: check

      - name: Install autoconf
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            tests/cross-package/producer.pkg/src/rust -> target
            tests/cross-package/consumer.pkg/src/rust -> target
          shared-key: cross-package
          cache-on-failure: true

      - name: Configure Linux
        run: |
          echo "LD_LIBRARY_PATH=$(R -s -e 'cat(R.home(\"lib\"))')" >> $GITHUB_ENV

      - name: Install cargo-revendor
        run: cargo install --path cargo-revendor

      - name: Configure and vendor
        run: |
          just configure
          just vendor

      - name: Build and test cross-package packages
        working-directory: tests/cross-package
        run: |
          just build-all
          just test-all

  # ===========================================================================
  # minirextendr (scaffolding helper package)
  # ===========================================================================
  minirextendr:
    name: minirextendr
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.r == 'true'
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: minirextendr
          extra-packages: any::rcmdcheck, any::testthat, any::devtools
          needs: check

      - name: Install autoconf
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        working-directory: minirextendr
        env:
          MINIEXTENDR_LOCAL_PATH: ${{ github.workspace }}
        run: Rscript -e "testthat::set_max_fails(Inf); testthat::test_local()"

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: minirextendr
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
          check-dir: '"check"'

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: logs-minirextendr
          path: minirextendr/check
          retention-days: 7

  # ===========================================================================
  # CRAN-like check (stricter, simulates CRAN environment)
  # ===========================================================================
  cran-check:
    name: CRAN-like check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: changes
    if: needs.changes.outputs.r == 'true'
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # NOT_CRAN is NOT set - simulates CRAN environment
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install autoconf
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          shared-key: cran-check
          cache-on-failure: true

      - name: Configure Linux
        run: |
          echo "LD_LIBRARY_PATH=$(R -s -e 'cat(R.home(\"lib\"))')" >> $GITHUB_ENV

      - name: Install cargo-revendor
        run: cargo install --path cargo-revendor

      - name: Configure and vendor
        run: |
          just configure
          just vendor

      - name: Build source tarball
        run: |
          # Remove vendor/ so tarball only contains inst/vendor.tar.xz
          rm -rf rpkg/vendor
          R CMD build rpkg
          echo "TARBALL=$(ls -1 miniextendr_*.tar.gz)" >> $GITHUB_ENV

      - name: R CMD check (CRAN-like, from tarball)
        run: |
          # Check the tarball without NOT_CRAN (simulates CRAN)
          R CMD check --as-cran --no-manual ${{ env.TARBALL }}
        env:
          # Override setup-r's NOT_CRAN=true so configure detects vendored-install
          NOT_CRAN: false

      - name: Copy check results
        if: always()
        run: |
          mkdir -p rpkg/check
          mv miniextendr.Rcheck rpkg/check/ 2>/dev/null || true

      - name: Print failed tests
        if: always()
        run: |
          for f in rpkg/check/*.Rcheck/tests/*.Rout.fail; do
            [ -f "$f" ] && echo "=== $f ===" && tail -n100 "$f"
          done || true

      - name: Print 00check.log and 00install.out
        if: always()
        run: |
          echo "=== 00install.out ==="
          cat rpkg/check/*.Rcheck/00install.out 2>/dev/null || echo "00install.out not found"
          echo ""
          echo "=== 00check.log ==="
          cat rpkg/check/*.Rcheck/00check.log 2>/dev/null || echo "00check.log not found"

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: logs-cran-check
          path: |
            rpkg/check
            rpkg/config.log
          retention-days: 7

  # ===========================================================================
  # Summary job (for branch protection)
  # ===========================================================================
  ci-success:
    name: CI Success
    needs:
      - generated-files-check
      - version-check
      - sync-checks
      - rust-lint
      - changes
      - r-check-linux
      # - r-check-macos   # DISABLED — re-enable when macOS job is uncommented above
      # - r-check-windows # DISABLED — re-enable when Windows job is uncommented above
      - r-tests
      - cross-package-tests
      - minirextendr
      - cran-check
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results=(
            "${{ needs.generated-files-check.result }}"
            "${{ needs.version-check.result }}"
            "${{ needs.sync-checks.result }}"
            "${{ needs.rust-lint.result }}"
            "${{ needs.changes.result }}"
            "${{ needs.r-check-linux.result }}"
            # "${{ needs.r-check-macos.result }}"   # DISABLED
            # "${{ needs.r-check-windows.result }}" # DISABLED
            "${{ needs.r-tests.result }}"
            "${{ needs.cross-package-tests.result }}"
            "${{ needs.minirextendr.result }}"
            "${{ needs.cran-check.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "One or more jobs failed: $result"
              exit 1
            fi
          done
          echo "All CI jobs passed!"
