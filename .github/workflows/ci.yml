name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ===========================================================================
  # Generated file hygiene check
  # ===========================================================================
  generated-files-check:
    name: Generated Files Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for committed generated files
        run: |
          # Files that should NOT be tracked in git (generated by configure)
          # NOTE: Cargo.toml and stub.c ARE intentionally tracked — they enable
          # cargo check / R CMD build without running configure first.
          generated_files=(
            "rpkg/src/Makevars"
            "rpkg/src/rust/.cargo/config.toml"
          )

          # Directories that should NOT be tracked
          generated_dirs=(
            "rpkg/src/rust/target"
            "rpkg/src/rust/ra_target"
            "rpkg/src/rust/.cargo"
            "rpkg/vendor"
          )

          failed=0

          echo "Checking for generated files that should not be committed..."
          for f in "${generated_files[@]}"; do
            if git ls-files --error-unmatch "$f" &>/dev/null; then
              echo "::error::Generated file '$f' is tracked in git. Remove it with: git rm --cached $f"
              failed=1
            fi
          done

          echo "Checking for generated directories that should not be committed..."
          for d in "${generated_dirs[@]}"; do
            if git ls-files -- "$d" | grep -q .; then
              echo "::error::Generated directory '$d' is tracked in git. Remove it with: git rm -r --cached $d"
              failed=1
            fi
          done

          if [ "$failed" -eq 0 ]; then
            echo "No generated files found in git tracking."
          else
            echo ""
            echo "These files are generated by 'just configure' and should not be committed."
            echo "Add them to .gitignore if not already present."
            exit 1
          fi

  # ===========================================================================
  # Version consistency check
  # ===========================================================================
  version-check:
    name: Version Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install just
        uses: taiki-e/install-action@just

      - name: Check version consistency
        run: |
          # Extract version from Cargo.toml [workspace.package]
          CARGO_VERSION=$(sed -n '/\[workspace\.package\]/,/^\[/{ s/^version = "\(.*\)"/\1/p; }' Cargo.toml | head -1)

          # Extract version from rpkg/DESCRIPTION
          R_VERSION=$(grep '^Version:' rpkg/DESCRIPTION | sed 's/Version: //')

          echo "Cargo.toml version: $CARGO_VERSION"
          echo "DESCRIPTION version: $R_VERSION"

          # Compare (allow R dev versions like X.Y.Z.9000 to match X.Y.Z)
          CARGO_BASE=$(echo "$CARGO_VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          R_BASE=$(echo "$R_VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')

          if [ "$CARGO_BASE" != "$R_BASE" ]; then
            echo "::error::Version mismatch! Cargo.toml ($CARGO_VERSION) vs DESCRIPTION ($R_VERSION)"
            echo "Run: ./scripts/bump-version.sh $CARGO_VERSION"
            exit 1
          fi

          echo "Versions match!"

  # ===========================================================================
  # Sync checks (vendor, templates, lint parser)
  # ===========================================================================
  sync-checks:
    name: Sync Checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.r == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install autoconf
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure and vendor
        run: |
          just configure
          just vendor

      - name: Check vendor sync
        run: just vendor-sync-check

      - name: Check templates sync
        run: just templates-check

      - name: Check lint parser sync
        run: just lint-sync-check

  # ===========================================================================
  # Change detection (path-based gating)
  # ===========================================================================
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      r: ${{ steps.filter.outputs.r }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Determine changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '.cargo/**'
              - '.github/workflows/**'
              - 'justfile'
            r:
              - 'rpkg/**'
              - 'minirextendr/**'
              - 'tests/cross-package/**'
              - 'miniextendr-api/**'
              - 'miniextendr-macros/**'
              - 'miniextendr-engine/**'
              - 'miniextendr-lint/**'
              - '**/*.R'
              - '**/*.r'
              - '**/configure.ac'
              - '**/configure'
              - '**/*.in'
              - '**/vendor.tar.xz'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '.cargo/**'
              - '.github/workflows/**'
              - 'justfile'
            docs:
              - 'rpkg/man/**'
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - 'README*'
              - 'docs/**'

  # ===========================================================================
  # R Package: R CMD check on Linux
  # ===========================================================================
  r-check-linux:
    name: R CMD check / Linux ${{ matrix.r }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: ${{ matrix.allow_failure || false }}
    needs: changes
    if: needs.changes.outputs.r == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - r: release
          - r: devel
            allow_failure: true # R-devel may break for upstream reasons
          - r: oldrel-1

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install autoconf
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          shared-key: r-linux-${{ matrix.r }}
          cache-on-failure: true

      - name: Configure Linux
        run: |
          echo "LD_LIBRARY_PATH=$(R -s -e 'cat(R.home(\"lib\"))')" >> $GITHUB_ENV

      - name: Configure and vendor
        run: |
          just configure
          just vendor

      # ---------------------------------------------------------------------
      # Rust checks (Linux only, run once on R=release)
      # - run all checks even if some fail
      # - fail the job afterwards if any of them failed
      # ---------------------------------------------------------------------
      - name: Rustfmt
        id: rustfmt
        if: matrix.r == 'release'
        continue-on-error: true
        run: cargo fmt --all -- --check

      - name: Clippy (default features)
        id: clippy_default
        if: matrix.r == 'release'
        continue-on-error: true
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Clippy (all features)
        id: clippy_all
        if: matrix.r == 'release'
        continue-on-error: true
        # NOTE: Can't use --all-features because default-r6/default-s7 are
        # mutually exclusive. List all non-conflicting features explicitly instead.
        run: >-
          cargo clippy --workspace --all-targets --locked
          --features rayon,rand,rand_distr,either,ndarray,nalgebra,serde,serde_json,num-bigint,rust_decimal,ordered-float,uuid,regex,indexmap,time,num-traits,bytes,num-complex,url,sha2,bitflags,bitvec,aho-corasick,toml,tabled,raw_conversions,vctrs,tinyvec,borsh,connections,nonapi,default-strict,default-coerce,default-r6,default-worker
          -- -D warnings

      # NOTE: Cargo tests are disabled due to stack overflow issues on Linux CI.
      # The R package functionality is already tested via R CMD check below.
      # To re-enable, uncomment and fix the stack overflow issue.
      # - name: Tests (default features)
      #   id: cargo_tests
      #   if: matrix.r == 'release'
      #   continue-on-error: true
      #   run: cargo test --workspace --locked --lib

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: rpkg
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
          check-dir: '"check"'
        env:
          NOT_CRAN: false

      - name: Fail if Rust checks failed
        if: always() && matrix.r == 'release'
        shell: bash
        run: |
          set -euo pipefail
          failed=0

          rustfmt="${{ steps.rustfmt.outcome }}"
          clippy_default="${{ steps.clippy_default.outcome }}"
          clippy_all="${{ steps.clippy_all.outcome }}"

          echo "rustfmt:         $rustfmt"
          echo "clippy_default:  $clippy_default"
          echo "clippy_all:      $clippy_all"

          if [[ "$rustfmt" != "success" ]]; then failed=1; fi
          if [[ "$clippy_default" != "success" ]]; then failed=1; fi
          if [[ "$clippy_all" != "success" ]]; then failed=1; fi

          if [[ "$failed" -ne 0 ]]; then
            echo "::error::One or more Rust checks failed (see logs above)"
            exit 1
          fi

      - name: Print failed tests
        if: always()
        run: |
          for f in rpkg/check/*.Rcheck/tests/*.Rout.fail; do
            [ -f "$f" ] && echo "=== $f ===" && tail -n100 "$f"
          done || true

      - name: Print 00check.log and 00install.out
        if: always()
        run: |
          echo "=== 00install.out ==="
          cat rpkg/check/*.Rcheck/00install.out 2>/dev/null || echo "00install.out not found"
          echo ""
          echo "=== 00check.log ==="
          cat rpkg/check/*.Rcheck/00check.log 2>/dev/null || echo "00check.log not found"

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: logs-linux-r${{ matrix.r }}
          path: |
            rpkg/check
            rpkg/config.log
          retention-days: 7

  # ===========================================================================
  # R Package: R CMD check on macOS
  # ===========================================================================
  r-check-macos:
    name: R CMD check / macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    needs: changes
    if: needs.changes.outputs.r == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - uses: actions/checkout@v6

      - name: Install just
        run: |
          brew install just
          echo "$(brew --prefix)/bin" >> $GITHUB_PATH

      - name: Install autoconf
        run: |
          brew install autoconf

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        id: sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true

      - name: Set RUSTC_WRAPPER if sccache available
        if: steps.sccache.outcome == 'success'
        run: echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          shared-key: r-macos-${{ matrix.arch }}
          cache-on-failure: true

      - name: Configure and vendor
        run: |
          just configure
          just vendor

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: rpkg
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
          check-dir: '"check"'
        env:
          NOT_CRAN: false

      - name: Print failed tests
        if: always()
        run: |
          for f in rpkg/check/*.Rcheck/tests/*.Rout.fail; do
            [ -f "$f" ] && echo "=== $f ===" && tail -n100 "$f"
          done || true

      - name: Print 00check.log and 00install.out
        if: always()
        run: |
          echo "=== 00install.out ==="
          cat rpkg/check/*.Rcheck/00install.out 2>/dev/null || echo "00install.out not found"
          echo ""
          echo "=== 00check.log ==="
          cat rpkg/check/*.Rcheck/00check.log 2>/dev/null || echo "00check.log not found"

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: logs-macos-${{ matrix.arch }}
          path: |
            rpkg/check
            rpkg/config.log
          retention-days: 7

  # ===========================================================================
  # R Package: R CMD check on Windows
  # ===========================================================================
  r-check-windows:
    name: R CMD check / Windows
    runs-on: windows-latest
    timeout-minutes: 90
    needs: changes
    if: needs.changes.outputs.r == 'true'
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      SCCACHE_GHA_ENABLED: "true"
      CARGO_BUILD_TARGET: x86_64-pc-windows-gnu

    steps:
      - uses: actions/checkout@v6

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          rtools-version: "45"
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Setup sccache
        id: sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true

      - name: Set RUSTC_WRAPPER if sccache available
        if: steps.sccache.outcome == 'success'
        shell: pwsh
        run: echo "RUSTC_WRAPPER=sccache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          shared-key: r-windows
          cache-on-failure: true

      - name: Configure Windows Rust environment
        shell: pwsh
        run: |
          $rtools_home = "C:\rtools45"

          # Add Rtools to PATH for configure/vendor steps
          Add-Content -Path $env:GITHUB_PATH -Value "${rtools_home}\x86_64-w64-mingw32.static.posix\bin"
          Add-Content -Path $env:GITHUB_PATH -Value "${rtools_home}\usr\bin"
          Add-Content -Path $env:GITHUB_PATH -Value "$(Rscript.exe -e 'cat(normalizePath(R.home()))')\bin\x64"

          # Create empty libgcc stubs for Rust linking (Rust std expects these)
          New-Item -Path libgcc_mock -Type Directory -Force
          New-Item -Path libgcc_mock\libgcc_eh.a -Type File -Force
          New-Item -Path libgcc_mock\libgcc_s.a -Type File -Force

          # Configure Cargo for Windows GNU target
          New-Item -Path .cargo -ItemType Directory -Force
          $pwd_slash = (Get-Location).Path -replace '\\','/'
          $config = "[target.x86_64-pc-windows-gnu]`nlinker = `"x86_64-w64-mingw32.static.posix-gcc.exe`"`n`n[env]`nLIBRARY_PATH = `"$pwd_slash/libgcc_mock`""
          [System.IO.File]::WriteAllText("$PWD\.cargo\config.toml", $config)

      - name: Configure and vendor
        shell: C:\rtools45\usr\bin\bash.exe -e -o pipefail {0}
        run: |
          export PATH="/c/rtools45/usr/bin:/c/rtools45/x86_64-w64-mingw32.static.posix/bin:$PATH"
          if [ -n "${CARGO_HOME:-}" ]; then
            export PATH="$(cygpath -u "$CARGO_HOME")/bin:$PATH"
          fi
          cd "$(cygpath -u "$GITHUB_WORKSPACE")/rpkg"
          CARGO_BUILD_TARGET=x86_64-pc-windows-gnu bash ./configure
          cd "$(cygpath -u "$GITHUB_WORKSPACE")"
          # Call Rscript directly — just's shell resolution on Windows
          # finds the WSL sh shim before rtools' bash.
          cd rpkg && Rscript tools/vendor-crates.R pack

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: rpkg
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
          check-dir: '"check"'
        env:
          NOT_CRAN: false

      - name: Print failed tests
        if: always()
        shell: bash
        run: |
          for f in rpkg/check/*.Rcheck/tests/*.Rout.fail; do
            [ -f "$f" ] && echo "=== $f ===" && tail -n100 "$f"
          done || true

      - name: Print 00check.log and 00install.out
        if: always()
        shell: bash
        run: |
          echo "=== 00install.out ==="
          cat rpkg/check/*.Rcheck/00install.out 2>/dev/null || echo "00install.out not found"
          echo ""
          echo "=== 00check.log ==="
          cat rpkg/check/*.Rcheck/00check.log 2>/dev/null || echo "00check.log not found"

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: logs-windows
          path: |
            rpkg/check
            rpkg/config.log
          retention-days: 7

  # ===========================================================================
  # R Package: Test suite (Linux only)
  # ===========================================================================
  r-tests:
    name: R tests / ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.r == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Linux
            runner: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::testthat
          needs: check

      - name: Install autoconf
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          shared-key: r-tests
          cache-on-failure: true

      - name: Configure and vendor
        run: |
          just configure
          just vendor

      - name: Install package
        working-directory: rpkg
        shell: bash
        run: R CMD INSTALL .

      - name: Run tests
        working-directory: rpkg
        shell: bash
        run: Rscript -e "testthat::test_local()"

  # ===========================================================================
  # Cross-package trait ABI tests
  # ===========================================================================
  cross-package-tests:
    name: Cross-Package Trait ABI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.r == 'true'
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::testthat, any::devtools
          needs: check

      - name: Install autoconf
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            tests/cross-package/producer.pkg/src/rust -> target
            tests/cross-package/consumer.pkg/src/rust -> target
          shared-key: cross-package
          cache-on-failure: true

      - name: Configure Linux
        run: |
          echo "LD_LIBRARY_PATH=$(R -s -e 'cat(R.home(\"lib\"))')" >> $GITHUB_ENV

      - name: Configure and vendor
        run: |
          just configure
          just vendor

      - name: Build and test cross-package packages
        working-directory: tests/cross-package
        run: |
          just build-all
          just test-all

  # ===========================================================================
  # minirextendr (scaffolding helper package)
  # ===========================================================================
  minirextendr:
    name: minirextendr
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.r == 'true'
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: minirextendr
          extra-packages: any::rcmdcheck, any::testthat, any::devtools
          needs: check

      - name: Install autoconf
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        working-directory: minirextendr
        env:
          MINIEXTENDR_LOCAL_PATH: ${{ github.workspace }}
        run: Rscript -e "testthat::test_local()"

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: minirextendr
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
          check-dir: '"check"'

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: logs-minirextendr
          path: minirextendr/check
          retention-days: 7

  # ===========================================================================
  # CRAN-like check (stricter, simulates CRAN environment)
  # ===========================================================================
  cran-check:
    name: CRAN-like check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: changes
    if: needs.changes.outputs.r == 'true'
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # NOT_CRAN is NOT set - simulates CRAN environment
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install autoconf
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          shared-key: cran-check
          cache-on-failure: true

      - name: Configure Linux
        run: |
          echo "LD_LIBRARY_PATH=$(R -s -e 'cat(R.home(\"lib\"))')" >> $GITHUB_ENV

      - name: Configure and vendor
        run: |
          just configure
          just vendor

      - name: Build source tarball
        run: |
          # Remove vendor/ so tarball only contains inst/vendor.tar.xz
          rm -rf rpkg/vendor
          R CMD build rpkg
          echo "TARBALL=$(ls -1 miniextendr_*.tar.gz)" >> $GITHUB_ENV

      - name: R CMD check (CRAN-like, from tarball)
        run: |
          # Check the tarball without NOT_CRAN (simulates CRAN)
          R CMD check --as-cran --no-manual ${{ env.TARBALL }}
        env:
          # Override setup-r's NOT_CRAN=true so configure detects vendored-install
          NOT_CRAN: false

      - name: Copy check results
        if: always()
        run: |
          mkdir -p rpkg/check
          mv miniextendr.Rcheck rpkg/check/ 2>/dev/null || true

      - name: Print failed tests
        if: always()
        run: |
          for f in rpkg/check/*.Rcheck/tests/*.Rout.fail; do
            [ -f "$f" ] && echo "=== $f ===" && tail -n100 "$f"
          done || true

      - name: Print 00check.log and 00install.out
        if: always()
        run: |
          echo "=== 00install.out ==="
          cat rpkg/check/*.Rcheck/00install.out 2>/dev/null || echo "00install.out not found"
          echo ""
          echo "=== 00check.log ==="
          cat rpkg/check/*.Rcheck/00check.log 2>/dev/null || echo "00check.log not found"

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: logs-cran-check
          path: |
            rpkg/check
            rpkg/config.log
          retention-days: 7

  # ===========================================================================
  # Summary job (for branch protection)
  # ===========================================================================
  ci-success:
    name: CI Success
    needs:
      - generated-files-check
      - version-check
      - sync-checks
      - changes
      - r-check-linux
      - r-check-macos
      - r-check-windows
      - r-tests
      - cross-package-tests
      - minirextendr
      - cran-check
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results=(
            "${{ needs.generated-files-check.result }}"
            "${{ needs.version-check.result }}"
            "${{ needs.sync-checks.result }}"
            "${{ needs.changes.result }}"
            "${{ needs.r-check-linux.result }}"
            "${{ needs.r-check-macos.result }}"
            "${{ needs.r-check-windows.result }}"
            "${{ needs.r-tests.result }}"
            "${{ needs.cross-package-tests.result }}"
            "${{ needs.minirextendr.result }}"
            "${{ needs.cran-check.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "One or more jobs failed: $result"
              exit 1
            fi
          done
          echo "All CI jobs passed!"
