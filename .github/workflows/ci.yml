name: CI

on:
  pull_request:
    # `labeled` lets the on-demand round-trip e2e job (r-roundtrip-e2e) be
    # triggered by applying the `run-e2e` label to a PR. The default activity
    # types (opened/synchronize/reopened) cover everything else; adding
    # labeled/unlabeled is additive — no existing job keys on the label.
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 6'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # CARGO_INCREMENTAL=0 — sccache can't cache rustc outputs when Cargo's
  # incremental compilation embeds per-invocation unique hashes into crate
  # metadata. With incremental off, rustc outputs are deterministic and
  # sccache hit rates jump from ~50% to near-100% across workspace crates.
  # See CLAUDE.md "sccache and [profile.dev] incremental" for details.
  CARGO_INCREMENTAL: "0"

jobs:
  # ===========================================================================
  # Generated file hygiene check
  # ===========================================================================
  generated-files-check:
    name: Generated Files Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for committed generated files
        run: |
          # Files that should NOT be tracked in git (generated by configure
          # or by the host cdylib pass).
          # NOTE: Cargo.toml and stub.c ARE intentionally tracked — they enable
          # cargo check / R CMD build without running configure first.
          # wrappers.R + wasm_registry.rs are generated by the cdylib pass on every
          # `R CMD INSTALL`; untracked to avoid constant merge conflicts (they ship
          # in the tarball from disk, regenerated by `just r-cmd-build`).
          generated_files=(
            "rpkg/src/Makevars"
            "rpkg/src/rust/.cargo/config.toml"
            "rpkg/R/miniextendr-wrappers.R"
            "rpkg/src/rust/wasm_registry.rs"
          )

          # Directories that should NOT be tracked
          generated_dirs=(
            "rpkg/src/rust/target"
            "rpkg/src/rust/ra_target"
            "rpkg/src/rust/.cargo"
            "rpkg/vendor"
          )

          failed=0

          echo "Checking for generated files that should not be committed..."
          for f in "${generated_files[@]}"; do
            if git ls-files --error-unmatch "$f" &>/dev/null; then
              echo "::error::Generated file '$f' is tracked in git. Remove it with: git rm --cached $f"
              failed=1
            fi
          done

          echo "Checking for generated directories that should not be committed..."
          for d in "${generated_dirs[@]}"; do
            if git ls-files -- "$d" | grep -q .; then
              echo "::error::Generated directory '$d' is tracked in git. Remove it with: git rm -r --cached $d"
              failed=1
            fi
          done

          if [ "$failed" -eq 0 ]; then
            echo "No generated files found in git tracking."
          else
            echo ""
            echo "These files are generated by 'just configure' and should not be committed."
            echo "Add them to .gitignore if not already present."
            exit 1
          fi

  # ===========================================================================
  # Version consistency check
  # ===========================================================================
  version-check:
    name: Version Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install just
        uses: taiki-e/install-action@just

      - name: Check version consistency
        run: |
          # Extract version from Cargo.toml [workspace.package]
          CARGO_VERSION=$(sed -n '/\[workspace\.package\]/,/^\[/{ s/^version = "\(.*\)"/\1/p; }' Cargo.toml | head -1)

          # Extract version from rpkg/DESCRIPTION
          R_VERSION=$(grep '^Version:' rpkg/DESCRIPTION | sed 's/Version: //')

          echo "Cargo.toml version: $CARGO_VERSION"
          echo "DESCRIPTION version: $R_VERSION"

          # Compare (allow R dev versions like X.Y.Z.9000 to match X.Y.Z)
          CARGO_BASE=$(echo "$CARGO_VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          R_BASE=$(echo "$R_VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')

          if [ "$CARGO_BASE" != "$R_BASE" ]; then
            echo "::error::Version mismatch! Cargo.toml ($CARGO_VERSION) vs DESCRIPTION ($R_VERSION)"
            echo "Run: ./scripts/bump-version.sh $CARGO_VERSION"
            exit 1
          fi

          echo "Versions match!"

  # ===========================================================================
  # Change detection (path-based gating)
  # ===========================================================================
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      r: ${{ steps.filter.outputs.r }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Determine changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            rust:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '.cargo/**'
              - '.github/workflows/**'
              - 'justfile'
            r:
              - 'rpkg/**'
              - 'minirextendr/**'
              - 'tests/cross-package/**'
              - 'miniextendr-api/**'
              - 'miniextendr-macros/**'
              - 'miniextendr-engine/**'
              - 'miniextendr-lint/**'
              - '**/*.R'
              - '**/*.r'
              - '**/configure.ac'
              - '**/configure'
              - '**/*.in'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '.cargo/**'
              - '.github/workflows/**'
              - 'justfile'
            docs:
              - 'rpkg/man/**'
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - 'README*'
              - 'docs/**'

  # ===========================================================================
  # Sync checks (vendor, templates, lint parser)
  # ===========================================================================
  sync-checks:
    name: Sync Checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.r == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install autoconf
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up cargo-revendor (install only)
        uses: ./.github/actions/setup-vendor
        with:
          configure-and-vendor: 'false'

      - name: Install R packages (devtools, roxygen2)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::devtools, any::roxygen2
          needs: check

      - name: Configure (dev mode — no vendor tarball yet)
        run: just configure

      - name: Check R wrappers / NAMESPACE / man sync
        # MUST run in dev mode (no inst/vendor.tar.xz yet) — tarball mode
        # short-circuits wrapper generation and expects pre-shipped files.
        run: just wrappers-sync-check

      - name: Vendor
        run: just vendor

      - name: Check vendor sync
        run: just vendor-sync-check

      - name: Check templates sync
        run: just templates-check

      - name: Check template justfile recipe sync
        run: just templates-recipes-check

      - name: Check lint parser sync
        run: just lint-sync-check

  # ===========================================================================
  # Rust lint (rustfmt + clippy) — runs independently of R CMD check
  # ===========================================================================
  rust-lint:
    name: Rust lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - uses: actions/checkout@v6

      # miniextendr-api/build.rs calls `R RHOME` (or reads $R_HOME) to resolve
      # libR's location, which only matters at link time. Lint steps (fmt +
      # clippy) never link, so pointing R_HOME at an existing dummy directory
      # satisfies build.rs's existence check without installing R. Saves ~1 min
      # of setup-r time on every lint run.
      - name: Set dummy R_HOME
        run: echo "R_HOME=$RUNNER_TEMP" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-lint
          cache-on-failure: true

      # `just fmt-check` iterates every manifest (root workspace +
      # rpkg/src/rust + tests/cross-package/*), not just the root workspace —
      # the non-root manifests are separate cargo workspaces that `cargo fmt
      # --all` alone never reaches. `cargo fmt --check` needs no dep
      # resolution / .cargo/config.toml, so this runs without `just configure`.
      - name: Install just
        uses: taiki-e/install-action@just

      - name: Rustfmt
        id: rustfmt
        continue-on-error: true
        run: just fmt-check 2>&1 | tee "$RUNNER_TEMP/rustfmt.log"
        shell: bash

      - name: Clippy (default features)
        id: clippy_default
        continue-on-error: true
        run: cargo clippy --workspace --all-targets --locked -- -D warnings 2>&1 | tee "$RUNNER_TEMP/clippy_default.log"
        shell: bash

      - name: Clippy (all features)
        id: clippy_all
        continue-on-error: true
        # The codegen-selector half is derived from miniextendr-api's
        # `full-codegen` aggregate (#677) so it can't drift from the Cargo.toml
        # definition — adding a new `*-default` / nonapi / connections selector
        # there updates CI automatically. `full-codegen` picks the `r6-default`
        # side of the r6/s7 mutex; `s7-default` is linted by clippy_default's
        # rpkg path. We still can't use `--features full` directly: it adds
        # heavy deps (arrow, datafusion, log) we don't need here. So we pass
        # `full-codegen` plus a curated integration list (the lighter crates) —
        # the latter is the only part still hand-maintained, and CI signal
        # matches what rpkg actually enables.
        run: >-
          cargo clippy --workspace --all-targets --locked
          --features full-codegen,rayon,rand,rand_distr,either,ndarray,nalgebra,serde,serde_json,num-bigint,rust_decimal,ordered-float,uuid,regex,indexmap,time,num-traits,bytes,num-complex,url,sha2,bitflags,bitvec,aho-corasick,toml,tabled,raw_conversions,vctrs,tinyvec,borsh,jiff,blake3,md5,globset,zstd
          -- -D warnings 2>&1 | tee "$RUNNER_TEMP/clippy_all.log"
        shell: bash

      # cargo-revendor is a standalone workspace excluded from the root
      # workspace, so the `--workspace` clippy steps above never reach it
      # (#778). It has no R linkage, so it lints without configure/R setup.
      - name: Clippy (cargo-revendor)
        id: clippy_revendor
        continue-on-error: true
        run: cargo clippy --manifest-path cargo-revendor/Cargo.toml --all-targets --locked -- -D warnings 2>&1 | tee "$RUNNER_TEMP/clippy_revendor.log"
        shell: bash

      - name: Rustdoc (cargo-revendor)
        id: doc_revendor
        continue-on-error: true
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --document-private-items --manifest-path cargo-revendor/Cargo.toml --locked 2>&1 | tee "$RUNNER_TEMP/doc_revendor.log"
        shell: bash

      - name: Fail if any Rust check failed
        if: always()
        shell: bash
        run: |
          set -uo pipefail
          failed=0

          rustfmt="${{ steps.rustfmt.outcome }}"
          clippy_default="${{ steps.clippy_default.outcome }}"
          clippy_all="${{ steps.clippy_all.outcome }}"
          clippy_revendor="${{ steps.clippy_revendor.outcome }}"
          doc_revendor="${{ steps.doc_revendor.outcome }}"

          echo "rustfmt:          $rustfmt"
          echo "clippy_default:   $clippy_default"
          echo "clippy_all:       $clippy_all"
          echo "clippy_revendor:  $clippy_revendor"
          echo "doc_revendor:     $doc_revendor"
          echo

          dump_failed() {
            local name="$1" outcome="$2" log="$RUNNER_TEMP/$1.log"
            if [[ "$outcome" != "success" ]]; then
              echo "::group::$name failure output"
              if [[ -f "$log" ]]; then
                cat "$log"
              else
                echo "(no log captured for $name)"
              fi
              echo "::endgroup::"
              failed=1
            fi
          }

          dump_failed rustfmt          "$rustfmt"
          dump_failed clippy_default   "$clippy_default"
          dump_failed clippy_all       "$clippy_all"
          dump_failed clippy_revendor  "$clippy_revendor"
          dump_failed doc_revendor     "$doc_revendor"

          if [[ "$failed" -ne 0 ]]; then
            echo "::error::One or more Rust checks failed (output dumped above)"
            exit 1
          fi

  # ===========================================================================
  # R Package: R CMD check on Linux
  # ===========================================================================
  r-check-linux:
    name: R CMD check / Linux ${{ matrix.r }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: ${{ matrix.allow_failure || false }}
    needs: changes
    if: needs.changes.outputs.r == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - r: release
          - r: devel
            allow_failure: true # R-devel may break for upstream reasons
          - r: oldrel-1

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install autoconf
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          shared-key: r-linux-${{ matrix.r }}
          cache-on-failure: true

      - name: Configure Linux
        run: |
          echo "LD_LIBRARY_PATH=$(R -s -e 'cat(R.home(\"lib\"))')" >> $GITHUB_ENV

      # NOTE: the vendor tarball is intentionally NOT cached. It is always
      # regenerated by `just vendor` (--force) in the step below, so caching it
      # bought nothing — and a restored tarball flipped `just configure` into
      # tarball mode, which made cargo-revendor drop in-PR workspace-crate edits
      # and re-fetch the framework from git@main (latch leak, #441 / #865).
      - name: Set up cargo-revendor and vendor
        uses: ./.github/actions/setup-vendor

      # NOTE: Cargo tests are disabled due to stack overflow issues on Linux CI.
      # The R package functionality is already tested via R CMD check below.
      # To re-enable, uncomment and fix the stack overflow issue.
      # - name: Tests (default features)
      #   id: cargo_tests
      #   if: matrix.r == 'release'
      #   continue-on-error: true
      #   run: cargo test --workspace --locked --lib

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: rpkg
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
          check-dir: '"check"'

      - name: Print failed tests
        if: always()
        run: |
          for f in rpkg/check/*.Rcheck/tests/*.Rout.fail; do
            [ -f "$f" ] && echo "=== $f ===" && tail -n100 "$f"
          done || true

      - name: Print 00check.log and 00install.out
        if: always()
        run: |
          echo "=== 00install.out ==="
          cat rpkg/check/*.Rcheck/00install.out 2>/dev/null || echo "00install.out not found"
          echo ""
          echo "=== 00check.log ==="
          cat rpkg/check/*.Rcheck/00check.log 2>/dev/null || echo "00check.log not found"

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: logs-linux-r${{ matrix.r }}
          path: |
            rpkg/check
            rpkg/config.log
          retention-days: 7

  # ===========================================================================
  # R Package: R CMD check on macOS
  # ===========================================================================
  # On-demand: this job runs only on workflow_dispatch + weekly cron (Sat 06:00 UTC).
  # Non-gating — intentionally not in ci-success.needs. Tracks #95 (macOS x86_64
  # SIGABRT regression probe). To force a run: gh workflow run ci.yml --ref main
  r-check-macos:
    name: R CMD check / macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    timeout-minutes: 90
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install just
        run: |
          brew install just
          echo "$(brew --prefix)/bin" >> $GITHUB_PATH

      - name: Install autoconf
        run: |
          brew install autoconf

      # Gotcha 5: CRAN's macOS binary R is built against a specific Xcode SDK
      # (Xcode 16.2 for x86_64 / Xcode 26.0 for arm64) and deployment target
      # (11.0 for x86_64 / 14.0 for arm64). Pin the SDK so our CI exercises
      # the same toolchain ABI we tell downstream maintainers to use.
      # Mirrors `minirextendr/inst/templates/r-release.yml`; docs are the
      # single source of truth, this duplication is by design.
      # See docs/RELEASE_WORKFLOW.md Gotcha 5.
      - name: Pin macOS SDK and deployment target
        run: |
          if [ "$(uname -m)" = "x86_64" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app || true
            echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV
          else
            sudo xcode-select -s /Applications/Xcode_26.0.app || true
            echo "MACOSX_DEPLOYMENT_TARGET=14.0" >> $GITHUB_ENV
          fi
          echo "xcode is set: $(xcode-select --print-path)"
          xcrun --show-sdk-version || true

      # Gotcha 6: CRAN's macOS binary R links against /opt/R/<arch>/lib system
      # libraries (libcurl, openssl, libtiff, ...) curated by
      # r-universe-org/macos-libs. Any Rust crate with a -sys C dep using
      # pkg-config will resolve against these — the same library set R itself
      # was built against. Pre-empts the "links fine locally, segfaults under
      # CRAN's R" trap. Inlined from r-devel/actions/setup-macos-tools@ec72e88.
      # See docs/RELEASE_WORKFLOW.md Gotcha 6.
      - name: Download CRAN system libraries
        run: |
          sudo mkdir -p /opt
          sudo chown $USER /opt
          curl --retry 3 --fail-with-body -sSL \
            https://github.com/r-universe-org/macos-libs/releases/download/2025-12-13/cranlibs-everything.tar.xz \
            -o libs.tar.xz
          sudo tar -xf libs.tar.xz -C / opt
          rm -f libs.tar.xz
          echo "PKG_CONFIG_PATH=/opt/R/$(uname -m)/lib/pkgconfig:/opt/R/$(uname -m)/share/pkgconfig" >> $GITHUB_ENV

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        id: sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true

      - name: Set RUSTC_WRAPPER if sccache available
        if: steps.sccache.outcome == 'success'
        run: echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          shared-key: r-macos-${{ matrix.arch }}
          cache-on-failure: true

      - name: Set up cargo-revendor and vendor
        uses: ./.github/actions/setup-vendor

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: rpkg
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
          check-dir: '"check"'
          # No NOT_CRAN — configure.ac detects tarball install from inst/vendor.tar.xz

      - name: Print failed tests
        if: always()
        run: |
          for f in rpkg/check/*.Rcheck/tests/*.Rout.fail; do
            [ -f "$f" ] && echo "=== $f ===" && tail -n100 "$f"
          done || true

      - name: Print 00check.log and 00install.out
        if: always()
        run: |
          echo "=== 00install.out ==="
          cat rpkg/check/*.Rcheck/00install.out 2>/dev/null || echo "00install.out not found"
          echo ""
          echo "=== 00check.log ==="
          cat rpkg/check/*.Rcheck/00check.log 2>/dev/null || echo "00check.log not found"

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: logs-macos-${{ matrix.arch }}
          path: |
            rpkg/check
            rpkg/config.log
          retention-days: 7

  # ===========================================================================
  # R Package: R CMD check on Windows
  # ===========================================================================
  # DISABLED: Windows CI is currently disabled. Uncomment the block below to
  # re-enable. Remember to also re-add `r-check-windows` to `ci-success.needs`
  # and its results array.
  # r-check-windows:
  #   name: R CMD check / Windows
  #   runs-on: windows-latest
  #   timeout-minutes: 90
  #   needs: changes
  #   if: needs.changes.outputs.r == 'true'
  #   # Use Rtools45 MSYS2 bash as the default shell for all run: steps.
  #   # This matches R's own build system (SHELL = sh from Rtools).
  #   # See docs/windows-build-environment.md for details.
  #   defaults:
  #     run:
  #       shell: C:\rtools45\usr\bin\bash.exe -e -o pipefail {0}
  #   env:
  #     GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
  #     R_KEEP_PKG_SOURCE: yes
  #     SCCACHE_GHA_ENABLED: "true"
  #     CARGO_BUILD_TARGET: x86_64-pc-windows-gnu
  #     # Dev profile: R CMD check doesn't benefit from optimized rustc output, and
  #     # MinGW linking is the dominant cost on Windows. Dev profile is ~3-5x faster
  #     # to compile/link than release and keeps codegen-units = 1 (linkme requirement).
  #     CARGO_PROFILE: dev
  #
  #   steps:
  #     - uses: actions/checkout@v6
  #       with:
  #         lfs: true
  #
  #     - name: Setup R
  #       uses: r-lib/actions/setup-r@v2
  #       with:
  #         r-version: release
  #         rtools-version: "45"
  #         use-public-rspm: true
  #
  #     - name: Setup R dependencies
  #       uses: r-lib/actions/setup-r-dependencies@v2
  #       with:
  #         working-directory: rpkg
  #         extra-packages: any::rcmdcheck
  #         needs: check
  #
  #     - name: Install Rust toolchain
  #       uses: dtolnay/rust-toolchain@stable
  #       with:
