  # ===========================================================================
  # R Package: Test suite (Linux only)
  # ===========================================================================
  r-tests:
    name: R tests / Linux
    runs-on: ubuntu-latest
    # This job bundles unit tests + the 3-round randomized gctorture heap-check
    # + the Valgrind ALTREP pass; the total runs ~47 min and outgrew the prior
    # 45-min cap (itself a 30->45 bump in #732), so the tip-of-main run was
    # being cancelled by timeout. Use the 90 min the other heavy jobs here use.
    # If it overruns again, split the heap-check/Valgrind into their own job(s)
    # rather than bumping a third time.
    timeout-minutes: 90
    needs: changes
    if: needs.changes.outputs.r == 'true'

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::testthat
          needs: check

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          shared-key: r-tests
          cache-on-failure: true

      - name: Install package (source mode)
        # Source-mode smoke test: no vendor tarball, no cargo-revendor needed.
        # configure.ac detects source install from the absence of inst/vendor.tar.xz
        # and lets cargo resolve deps normally (network or monorepo path overrides).
        run: R CMD INSTALL rpkg

      - name: Run tests
        working-directory: rpkg
        shell: bash
        run: Rscript -e "testthat::test_local()"

      - name: Run tests with heap checking (3 rounds, randomized order)
        # Heap checking (glibc MALLOC_CHECK_, 3 randomized rounds) is the
        # GC-discipline guard, but it runs ~30+ min and reliably overruns the
        # 45-min job budget (bumped 30 -> 45 in #732 and still cancelling).
        # Gate it on PRs behind the `heap-check` label so routine PRs stay fast;
        # still run it unconditionally on push-to-main, the weekly schedule, and
        # manual dispatch so merged code keeps its GC safety net.
        if: >-
          github.event_name != 'pull_request' ||
          contains(github.event.pull_request.labels.*.name, 'heap-check')
        working-directory: rpkg
        shell: bash
        env:
          # MALLOC_CHECK_=3: glibc checks heap consistency on every malloc/free
          # and aborts immediately on corruption (not lazily). This catches
          # heap-corrupting UB at the point it happens, not later.
          MALLOC_CHECK_: "3"
          # MALLOC_PERTURB_: fills freed memory with a non-zero pattern,
          # making use-after-free crashes deterministic instead of sporadic.
          MALLOC_PERTURB_: "165"
        run: |
          for i in 1 2 3; do
            echo "=== Heap-checked test run $i/3 ==="
            Rscript -e "testthat::test_local()" || exit 1
          done

      - name: Run ALTREP tests under Valgrind
        if: always()
        working-directory: rpkg
        shell: bash
        run: |
          sudo apt-get install -y valgrind 2>/dev/null || true
          if command -v valgrind &>/dev/null; then
            echo "=== Valgrind memcheck on ALTREP materialization ==="
            R -d "valgrind --tool=memcheck --leak-check=full --track-origins=yes --error-exitcode=1" \
              -e 'library(miniextendr); testthat::test_local(filter = "altrep-materialization")' \
              2>&1 | tee /tmp/valgrind.log || true
            echo "=== Valgrind summary ==="
            grep -A 5 "ERROR SUMMARY\|Invalid read\|Invalid write\|Use of uninitialised" /tmp/valgrind.log || echo "No errors found"
          else
            echo "Valgrind not available, skipping"
          fi

  # ===========================================================================
  # Cross-package trait ABI tests
  # ===========================================================================
  cross-package-tests:
    name: Cross-Package Trait ABI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.r == 'true'
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::testthat, any::devtools
          needs: check

      - name: Install autoconf
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            tests/cross-package/producer.pkg/src/rust -> target
            tests/cross-package/consumer.pkg/src/rust -> target
          shared-key: cross-package
          cache-on-failure: true

      - name: Configure Linux
        run: |
          echo "LD_LIBRARY_PATH=$(R -s -e 'cat(R.home(\"lib\"))')" >> $GITHUB_ENV

      - name: Build and test cross-package packages
        working-directory: tests/cross-package
        run: |
          just build-all
          just test-all

  # ===========================================================================
  # minirextendr (scaffolding helper package)
  # ===========================================================================
  minirextendr:
    name: minirextendr
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.r == 'true'
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: minirextendr
          extra-packages: any::rcmdcheck, any::testthat, any::devtools
          needs: check

      - name: Install autoconf
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        working-directory: minirextendr
        env:
          MINIEXTENDR_LOCAL_PATH: ${{ github.workspace }}
        run: Rscript -e "testthat::set_max_fails(Inf); testthat::test_local()"

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: minirextendr
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
          check-dir: '"check"'

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: logs-minirextendr
          path: minirextendr/check
          retention-days: 7

  # ===========================================================================
  # CRAN-like check (stricter, simulates CRAN environment)
  # ===========================================================================
  cran-check:
    name: CRAN-like check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: changes
    if: needs.changes.outputs.r == 'true'
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # Tarball install mode is detected by configure.ac from the presence of
      # inst/vendor.tar.xz (produced by `just vendor` below). No NOT_CRAN needed.
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: rpkg
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install autoconf
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          shared-key: cran-check
          cache-on-failure: true

      - name: Configure Linux
        run: |
          echo "LD_LIBRARY_PATH=$(R -s -e 'cat(R.home(\"lib\"))')" >> $GITHUB_ENV

      # NOTE: the vendor tarball is intentionally NOT cached. It is always
      # regenerated by `just vendor` (--force) in the step below, so caching it
      # bought nothing — and a restored tarball flipped `just configure` into
      # tarball mode, which made cargo-revendor drop in-PR workspace-crate edits
      # and re-fetch the framework from git@main (latch leak, #441 / #865).
      - name: Set up cargo-revendor and vendor
        uses: ./.github/actions/setup-vendor

      - name: Build source tarball
        run: |
          # Remove vendor/ so tarball only contains inst/vendor.tar.xz
          rm -rf rpkg/vendor
          R CMD build rpkg
          echo "TARBALL=$(ls -1 miniextendr_*.tar.gz)" >> $GITHUB_ENV

      - name: R CMD check (CRAN-like, from tarball)
        run: |
          # Check the tarball without NOT_CRAN — configure.ac detects tarball
          # install mode from the presence of inst/vendor.tar.xz (shipped inside
          # the built tarball by `just vendor` above).
          R CMD check --as-cran --no-manual ${{ env.TARBALL }}

      - name: Copy check results
        if: always()
        run: |
          mkdir -p rpkg/check
          mv miniextendr.Rcheck rpkg/check/ 2>/dev/null || true

      - name: Print failed tests
        if: always()
        run: |
          for f in rpkg/check/*.Rcheck/tests/*.Rout.fail; do
            [ -f "$f" ] && echo "=== $f ===" && tail -n100 "$f"
          done || true

      - name: Print 00check.log and 00install.out
        if: always()
        run: |
          echo "=== 00install.out ==="
          cat rpkg/check/*.Rcheck/00install.out 2>/dev/null || echo "00install.out not found"
          echo ""
          echo "=== 00check.log ==="
          cat rpkg/check/*.Rcheck/00check.log 2>/dev/null || echo "00check.log not found"

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: logs-cran-check
          path: |
            rpkg/check
            rpkg/config.log
          retention-days: 7

  # ===========================================================================
  # Bootstrap vendor regression test (#441 latch)
  # ===========================================================================
  bootstrap-vendor-test:
    name: Bootstrap Vendor Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.r == 'true'
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install rv (for .Rprofile activate.R)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RV_VERSION=$(gh api repos/A2-ai/rv/releases/latest --jq .tag_name)
          : "${RV_VERSION:?empty rv version}"
          curl --proto '=https' --tlsv1.2 --retry 5 --retry-connrefused --location \
               --silent --show-error --fail \
               "https://github.com/A2-ai/rv/releases/download/${RV_VERSION}/rv-${RV_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
               -o /tmp/rv.tar.gz
          # Tarball ships a flat `rv` binary at the top level — no subdir.
          tar -xzf /tmp/rv.tar.gz -C /tmp
          sudo install -m 0755 /tmp/rv /usr/local/bin/rv
          rv --version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          # bootstrap.R calls cargo-revendor which calls `cargo metadata` on the
          # rpkg workspace — cache that workspace's target dir.
          workspaces: rpkg/src/rust -> target
          shared-key: bootstrap-vendor-test
          cache-on-failure: true

      - name: Set up cargo-revendor (install only)
        uses: ./.github/actions/setup-vendor
        with:
          configure-and-vendor: 'false'

      - name: Run bootstrap-vendor regression test
        run: just test-bootstrap-vendor

  # ===========================================================================
  # Standalone round-trip e2e (on-demand: nightly cron + label + dispatch)
  # ===========================================================================
  # Exercises the full standalone (non-monorepo) flow that the per-PR suite
  # cannot afford: create_miniextendr_package() -> miniextendr_build() (auto-
  # vendor flips to tarball mode mid-install) -> wrapper-gen -> install ->
  # library() exposes the functions. This is the #757/#775 regression target:
  # any change that makes a build entry point bypass MINIEXTENDR_FORCE_WRAPPER_GEN
  # (or alters the tarball-mode skip) re-introduces the empty-namespace bug.
  #
  # The assertions live in the gated testthat round-trip at
  # minirextendr/tests/testthat/test-templates.R:521 — CI runs the suite, it does
  # NOT reimplement the checks in shell (per #805). MINIEXTENDR_RUN_E2E=1 lifts
  # skip_e2e()'s skip_on_ci() so the otherwise-skipped e2e tests actually run.
  #
  # On-demand only — NOT in ci-success.needs, so it never gates a PR and adds no
  # minutes to normal runs. Triggers: weekly cron (Sat 06:00 UTC), the `run-e2e`
  # PR label, or `gh workflow run ci.yml --ref <branch>`. Heavy: cold-compiles
  # Rust + autoconf + network-fetches/vendors miniextendr `main`.
  r-roundtrip-e2e:
    name: Standalone round-trip e2e
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      contains(github.event.pull_request.labels.*.name, 'run-e2e')
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: minirextendr
          extra-packages: any::testthat, any::devtools, any::withr, any::roxygen2
          needs: check

      - name: Install autoconf
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rpkg/src/rust -> target
          shared-key: roundtrip-e2e
          cache-on-failure: true

      # cargo-revendor on PATH so the standalone build's auto-vendor (tarball
      # mode) can seal inst/vendor.tar.xz mid-install.
      - name: Set up cargo-revendor (install only)
        uses: ./.github/actions/setup-vendor
        with:
          configure-and-vendor: 'false'

      - name: Run standalone round-trip e2e
        run: just minirextendr-roundtrip

  # ===========================================================================
  # Summary job (for branch protection)
  # ===========================================================================
  ci-success:
    name: CI Success
    needs:
      - generated-files-check
      - version-check
      - sync-checks
      - rust-lint
      - changes
      - r-check-linux
      # - r-check-macos   # non-gating: runs only on workflow_dispatch + weekly cron, see #95
      # - r-check-windows # DISABLED — re-enable when Windows job is uncommented above
      - r-tests
      - cross-package-tests
      - minirextendr
      - cran-check
      - bootstrap-vendor-test
      # - r-roundtrip-e2e # non-gating: on-demand only (cron / run-e2e label / dispatch), see #775
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results=(
            "${{ needs.generated-files-check.result }}"
            "${{ needs.version-check.result }}"
            "${{ needs.sync-checks.result }}"
            "${{ needs.rust-lint.result }}"
            "${{ needs.changes.result }}"
            "${{ needs.r-check-linux.result }}"
            # "${{ needs.r-check-macos.result }}"   # non-gating, see #95
            # "${{ needs.r-check-windows.result }}" # DISABLED
            "${{ needs.r-tests.result }}"
            "${{ needs.cross-package-tests.result }}"
            "${{ needs.minirextendr.result }}"
            "${{ needs.cran-check.result }}"
            "${{ needs.bootstrap-vendor-test.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "One or more jobs failed: $result"
              exit 1
            fi
          done
          echo "All CI jobs passed!"
