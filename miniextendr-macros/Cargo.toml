[package]
name = "miniextendr-macros"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Procedural macros for miniextendr - Rust bindings for R"
documentation = "https://docs.rs/miniextendr-macros"

[lib]
proc-macro = true

[features]
doc-lint = ["dep:proc-macro-error"]

[dependencies]
proc-macro2 = { workspace = true }
quote = { workspace = true }
syn = { workspace = true }
proc-macro-error = { version = "1.0", optional = true }

[dev-dependencies]
trybuild = "1.0"
