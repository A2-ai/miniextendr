[package]
name = "miniextendr-api"
edition.workspace = true
version.workspace = true

[features]
default = []
## Enable non-API R functions. These may break with R updates and cause
## `R CMD check` warnings. See NONAPI.md for details.
nonapi = []

[dependencies]
miniextendr-macros = { path = "../miniextendr-macros" }
rayon = { version = "1.11.0", optional = true }

[dev-dependencies]
miniextendr-engine = { path = "../miniextendr-engine" }
