[package]
name = "rpkg"
version = "0.1.0"
edition = "2024"
publish = false

# Make this a standalone workspace (prevents inheriting from parent)
[workspace]

[[bin]]
name = "document"
path = "document.rs"
bench = false

[lib]
path = "lib.rs"
crate-type = ["rlib", "staticlib"]

[features]
default = []
nonapi = ["miniextendr-api/nonapi"]
connections = ["miniextendr-api/connections"]
# Optional features (pass-through to miniextendr-api)
rayon = ["miniextendr-api/rayon"]
rand = ["miniextendr-api/rand"]
rand_distr = ["miniextendr-api/rand_distr"]
either = ["miniextendr-api/either"]
ndarray = ["miniextendr-api/ndarray"]
nalgebra = ["miniextendr-api/nalgebra"]
serde = ["miniextendr-api/serde", "dep:serde"]
serde_json = ["miniextendr-api/serde_json", "dep:serde"]
num-bigint = ["miniextendr-api/num-bigint"]
rust_decimal = ["miniextendr-api/rust_decimal"]
ordered-float = ["miniextendr-api/ordered-float"]
uuid = ["miniextendr-api/uuid"]
regex = ["miniextendr-api/regex"]
indexmap = ["miniextendr-api/indexmap"]
time = ["miniextendr-api/time", "dep:time"]
num-traits = ["miniextendr-api/num-traits"]
bytes = ["miniextendr-api/bytes"]
num-complex = ["miniextendr-api/num-complex"]
url = ["miniextendr-api/url"]
sha2 = ["miniextendr-api/sha2"]
bitflags = ["miniextendr-api/bitflags", "dep:bitflags"]
bitvec = ["miniextendr-api/bitvec"]
aho-corasick = ["miniextendr-api/aho-corasick"]
toml = ["miniextendr-api/toml"]
tabled = ["miniextendr-api/tabled"]
raw_conversions = ["miniextendr-api/raw_conversions"]
vctrs = ["miniextendr-api/vctrs"]
tinyvec = ["miniextendr-api/tinyvec"]

[dependencies]
miniextendr-api = { git = "https://github.com/CGMossa/miniextendr" }
serde = { version = "1", optional = true, features = ["derive"] }
bitflags = { version = "2", optional = true }
time = { version = "0.3", optional = true, features = ["macros", "formatting"] }

[build-dependencies]
miniextendr-lint = { git = "https://github.com/CGMossa/miniextendr" }

# Development: use local monorepo paths instead of git
# These patches are active when building from the monorepo
# Note: miniextendr-macros is a dependency of miniextendr-api, so we patch it too
[patch."https://github.com/CGMossa/miniextendr"]
miniextendr-api = { path = "../../../miniextendr-api" }
miniextendr-macros = { path = "../../../miniextendr-macros" }
miniextendr-macros-core = { path = "../../../miniextendr-macros-core" }
miniextendr-lint = { path = "../../../miniextendr-lint" }
