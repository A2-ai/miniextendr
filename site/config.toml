base_url = "https://a2-ai.github.io/miniextendr"
title = "miniextendr"
description = "A Rust-R interoperability framework for building R packages with Rust backends"
compile_sass = true
build_search_index = true
generate_feeds = false

[search]
index_format = "elasticlunr_json"

[link_checker]
internal_level = "error"
# External URLs are warn-only: CI runners get bot-blocked (403) by hosts like
# lib.rs, so gating them makes unrelated docs PRs flaky. External liveness is
# a quarterly-audit concern, not a CI gate.
external_level = "warn"

[markdown]
insert_anchor_links = "left"
smart_punctuation = true
lazy_async_image = true

[markdown.highlighting]
theme = "github-dark"

[extra]
repo_url = "https://github.com/A2-ai/miniextendr"
